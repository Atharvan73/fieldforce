<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FieldForce">
<meta name="application-name" content="FieldForce Pro">
<meta name="theme-color" content="#0F172A">
<meta name="description" content="Shakti Machinery — B2B Field Sales Dashboard">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>FieldForce Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root {
  --bg: #0F172A;
  --bg2: #1E293B;
  --bg3: #334155;
  --border: #334155;
  --border2: #475569;
  --text: #F1F5F9;
  --text2: #94A3B8;
  --text3: #64748B;
  --indigo: #6366F1;
  --indigo2: #818CF8;
  --emerald: #10B981;
  --amber: #F59E0B;
  --red: #EF4444;
  --purple: #8B5CF6;
  --blue: #3B82F6;
  --card-radius: 14px;
  --btn-radius: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

/* APP SHELL — responsive */
#app { width: 100%; height: 100dvh; display: flex; flex-direction: column; background: var(--bg); overflow: hidden; }

/* TOPBAR */
#topbar { background: var(--bg); border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; z-index: 50; }
.topbar-logo { display: flex; align-items: center; gap: 8px; }
.logo-mark { width: 28px; height: 28px; background: var(--indigo); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #fff; }
.topbar-title { font-size: 14px; font-weight: 600; letter-spacing: -0.3px; }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.notif-btn { position: relative; cursor: pointer; color: var(--text2); }
.notif-dot { position: absolute; top: -2px; right: -2px; width: 7px; height: 7px; background: var(--red); border-radius: 50%; border: 1.5px solid var(--bg); }
.user-av { width: 30px; height: 30px; border-radius: 50%; background: var(--indigo); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; cursor: pointer; color: #fff; }

/* MAIN BODY — sidebar + content */
#main-body { flex: 1; display: flex; overflow: hidden; }

/* SIDEBAR NAV (desktop only) */
#sidebar { width: 220px; flex-shrink: 0; background: var(--bg2); border-right: 1px solid var(--border); display: none; flex-direction: column; padding: 12px 10px; overflow-y: auto; }
#sidebar::-webkit-scrollbar { display: none; }
.side-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; cursor: pointer; color: var(--text2); font-size: 13px; font-weight: 500; border: none; background: none; width: 100%; text-align: left; transition: all .15s; margin-bottom: 2px; }
.side-item:hover { background: var(--bg3); color: var(--text); }
.side-item.active { background: rgba(99,102,241,.12); color: var(--indigo2); }
.side-item i { font-size: 18px; flex-shrink: 0; }
.side-section { font-size: 9px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; padding: 8px 12px 4px; margin-top: 6px; }
.side-footer { margin-top: auto; padding-top: 12px; border-top: 1px solid var(--border); }
.side-user { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-radius: 8px; cursor: pointer; }
.side-user:hover { background: var(--bg3); }
.side-user-info { flex: 1; min-width: 0; }
.side-user-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.side-user-role { font-size: 10px; color: var(--text3); }

/* CONTENT AREA */
#content-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

/* PAGES */
#pages { flex: 1; overflow: hidden; position: relative; }
.page { position: absolute; inset: 0; overflow-y: auto; padding: 16px 16px 76px; display: none; }
.page.active { display: block; }
.page::-webkit-scrollbar { width: 4px; }
.page::-webkit-scrollbar-track { background: transparent; }
.page::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

/* PANELS — full content area on desktop, full screen on mobile */
.panel { position: absolute; inset: 0; background: var(--bg); z-index: 40; overflow-y: auto; padding: 20px 20px 30px; display: none; flex-direction: column; }
.panel.open { display: flex; }
.panel::-webkit-scrollbar { width: 4px; }
.panel::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

@keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:.8} }
@keyframes spin { to{transform:rotate(360deg)} }
/* Pull to refresh indicator */
#ptr-indicator { position:fixed;top:56px;left:50%;transform:translateX(-50%);background:var(--indigo);color:#fff;border-radius:20px;padding:6px 14px;font-size:11px;font-weight:600;display:none;z-index:100;gap:6px;align-items:center; }
#ptr-indicator.visible { display:flex; }
#bottomnav { background: var(--bg); border-top: 1px solid var(--border); display: flex; flex-shrink: 0; z-index: 50; padding-bottom: env(safe-area-inset-bottom); }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 8px 4px; cursor: pointer; color: var(--text3); font-size: 10px; font-weight: 500; border: none; background: none; transition: color .2s; }
.nav-item.active { color: var(--indigo2); }
.nav-item i { font-size: 20px; }

/* MOBILE ONLY */
@media (max-width: 767px) {
  #hamburger-btn { display: block !important; }
  #mobile-drawer { transition: transform .25s ease; }
  #mobile-drawer.open { display: flex !important; }
  #mobile-drawer-overlay.open { display: block !important; }
}

/* DESKTOP BREAKPOINT */
@media (min-width: 768px) {
  #app { max-width: 100%; }
  #sidebar { display: flex; }
  #bottomnav { display: none; }
  .page { padding: 28px 32px 28px; max-width: 900px; }
  .panel { padding: 28px 32px 28px; }
  /* wider grid layouts on desktop */
  .desk-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .desk-grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  /* login screen wider */
  #login-screen > div { max-width: 440px; }
  /* toast above nothing since no bottom nav */
  .toast { bottom: 24px; }
  /* cards slightly larger */
  .card { padding: 18px; margin-bottom: 14px; }
  /* text sizes up slightly */
  .page h1, .page > div > div:first-child { font-size: 18px; }
}

/* LARGE DESKTOP — wider sidebar */
@media (min-width: 1200px) {
  #sidebar { width: 240px; }
  .page { max-width: 1000px; }
}

/* CARDS */
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--card-radius); padding: 14px; margin-bottom: 10px; }
.card-sm { background: var(--bg3); border-radius: 8px; padding: 10px; }

/* BADGES */
.badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 500; }
.badge-blue { background: rgba(99,102,241,.15); color: var(--indigo2); }
.badge-green { background: rgba(16,185,129,.15); color: #34D399; }
.badge-amber { background: rgba(245,158,11,.15); color: #FCD34D; }
.badge-red { background: rgba(239,68,68,.15); color: #FCA5A5; }
.badge-purple { background: rgba(139,92,246,.15); color: #C4B5FD; }
.badge-gray { background: var(--bg3); color: var(--text2); border: 1px solid var(--border2); }

/* PRIORITY */
.pA { background: rgba(239,68,68,.15); color: #FCA5A5; border: 1px solid rgba(239,68,68,.3); border-radius: 4px; padding: 0 5px; font-size: 9px; font-weight: 700; }
.pB { background: rgba(245,158,11,.15); color: #FCD34D; border: 1px solid rgba(245,158,11,.3); border-radius: 4px; padding: 0 5px; font-size: 9px; font-weight: 700; }
.pC { background: var(--bg3); color: var(--text2); border: 1px solid var(--border2); border-radius: 4px; padding: 0 5px; font-size: 9px; font-weight: 700; }

/* PROGRESS */
.pbar-wrap { background: var(--bg3); border-radius: 4px; overflow: hidden; }
.pbar { border-radius: 4px; transition: width .5s ease; }

/* BUTTONS */
.btn { display: inline-flex; align-items: center; gap: 5px; padding: 8px 14px; border-radius: var(--btn-radius); font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border2); background: var(--bg2); color: var(--text); font-family: 'DM Sans', sans-serif; transition: all .15s; }
.btn:active { opacity: .8; transform: scale(.97); }
.btn:disabled, .btn[disabled] { opacity: .55; cursor: not-allowed; pointer-events: none; }
.btn:disabled:active, .btn[disabled]:active { transform: none; }
.btn-primary { background: var(--indigo); color: #fff; border-color: var(--indigo); }
.btn-success { background: var(--emerald); color: #fff; border-color: var(--emerald); }
.btn-danger { background: rgba(239,68,68,.15); color: #FCA5A5; border-color: rgba(239,68,68,.3); }
.btn-purple { background: var(--purple); color: #fff; border-color: var(--purple); }
.btn-sm { padding: 5px 10px; font-size: 11px; border-radius: 8px; }
.btn-full { width: 100%; justify-content: center; padding: 12px; font-size: 13px; }

/* INPUTS */
.inp { width: 100%; padding: 10px 12px; border: 1px solid var(--border2); border-radius: 8px; background: var(--bg3); color: var(--text); font-size: 13px; outline: none; font-family: 'DM Sans', sans-serif; transition: border-color .2s; }
.inp:focus { border-color: var(--indigo); }
.inp::placeholder { color: var(--text3); }
select.inp { cursor: pointer; }
.inp-label { font-size: 11px; color: var(--text2); margin-bottom: 5px; font-weight: 500; letter-spacing: .3px; }
.inp-group { margin-bottom: 12px; }

/* LAYOUT */
.row { display: flex; align-items: center; gap: 8px; }
.row-between { display: flex; align-items: center; justify-content: space-between; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

/* TEXT */
.text-xs { font-size: 10px; color: var(--text3); }
.text-sm { font-size: 11px; color: var(--text2); }
.text-label { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .8px; }
.text-mono { font-family: 'DM Mono', monospace; }

/* CHIPS / FILTER TABS */
.chip-row { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; margin-bottom: 10px; }
.chip-row::-webkit-scrollbar { display: none; }
.chip { padding: 5px 12px; border-radius: 20px; font-size: 11px; border: 1px solid var(--border2); background: var(--bg2); color: var(--text2); cursor: pointer; white-space: nowrap; flex-shrink: 0; font-weight: 500; transition: all .15s; }
.chip.active { background: var(--indigo); color: #fff; border-color: var(--indigo); }

/* SEGMENT TABS */
.seg-tabs { display: flex; background: var(--bg3); border-radius: 10px; padding: 3px; margin-bottom: 12px; }
.seg-tab { flex: 1; padding: 6px 4px; font-size: 11px; font-weight: 500; text-align: center; border-radius: 8px; cursor: pointer; border: none; background: none; color: var(--text2); transition: all .15s; }
.seg-tab.active { background: var(--bg2); color: var(--indigo2); border: 1px solid var(--border); }

/* LIST ITEMS */
.list-item { padding: 10px 0; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 10px; }
.list-item:last-child { border-bottom: none; padding-bottom: 0; }

/* STATUS DOTS */
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.dot-green { background: var(--emerald); }
.dot-amber { background: var(--amber); animation: pulse 1.5s infinite; }
.dot-blue { background: var(--blue); }
.dot-gray { background: var(--text3); }

/* COMPANY LIST */
.co-list { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--card-radius); overflow: hidden; margin-bottom: 10px; }
.co-row { border-bottom: 1px solid var(--border); }
.co-row:last-child { border-bottom: none; }
.co-row-head { display: flex; align-items: center; padding: 9px 12px; cursor: pointer; gap: 8px; transition: background .1s; }
.co-row-head:active { background: var(--bg3); }
.co-num { width: 20px; font-size: 10px; color: var(--text3); text-align: right; flex-shrink: 0; }
.co-info { flex: 1; min-width: 0; }
.co-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.co-sub { font-size: 10px; color: var(--text3); margin-top: 1px; }
.co-meta { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.co-ach { text-align: right; }
.co-ach-val { font-size: 11px; font-weight: 600; }
.co-ach-tgt { font-size: 9px; color: var(--text3); }
.co-expand { background: var(--bg3); border-top: 1px solid var(--border); padding: 10px 12px; display: none; }
.co-expand.open { display: block; }
.expand-link { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--indigo2); cursor: pointer; margin-top: 8px; font-weight: 500; }

/* PLAN ITEMS */
.plan-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.plan-item:last-child { border-bottom: none; }
.plan-time { font-size: 11px; font-weight: 500; color: var(--text2); width: 38px; flex-shrink: 0; margin-top: 2px; font-family: 'DM Mono', monospace; }
.plan-body { flex: 1; min-width: 0; }
.plan-co { font-size: 12px; font-weight: 500; }
.plan-meta { font-size: 10px; color: var(--text3); margin-top: 2px; }

/* CAL EVENTS */
.cal-ev { display: flex; align-items: center; gap: 8px; padding: 9px 11px; background: rgba(59,130,246,.1); border: 1px solid rgba(59,130,246,.2); border-radius: 8px; margin-bottom: 6px; }
.ai-ev { display: flex; align-items: flex-start; gap: 8px; padding: 9px 11px; background: rgba(139,92,246,.1); border: 1px solid rgba(139,92,246,.2); border-radius: 8px; margin-bottom: 6px; }

/* SLAB */
.slab { display: flex; align-items: center; gap: 10px; padding: 10px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 7px; transition: all .2s; }
.slab.active-slab { border-color: var(--indigo); background: rgba(99,102,241,.08); }
.slab.done-slab { border-color: rgba(16,185,129,.3); background: rgba(16,185,129,.06); }
.slab-circle { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; flex-shrink: 0; }

/* VEHICLE TAGS */
.v-2w { display: inline-flex; align-items: center; gap: 3px; font-size: 9px; font-weight: 600; padding: 2px 6px; border-radius: 4px; background: rgba(245,158,11,.15); color: #FCD34D; border: 1px solid rgba(245,158,11,.2); }
.v-4w { display: inline-flex; align-items: center; gap: 3px; font-size: 9px; font-weight: 600; padding: 2px 6px; border-radius: 4px; background: rgba(59,130,246,.15); color: #93C5FD; border: 1px solid rgba(59,130,246,.2); }
.v-pt { display: inline-flex; align-items: center; gap: 3px; font-size: 9px; font-weight: 600; padding: 2px 6px; border-radius: 4px; background: rgba(16,185,129,.15); color: #6EE7B7; border: 1px solid rgba(16,185,129,.2); }

/* PANEL (full screen overlay) */
.panel { position: absolute; inset: 0; background: var(--bg); z-index: 40; overflow-y: auto; padding: 14px 14px 30px; display: none; flex-direction: column; }
.panel.open { display: flex; }
.panel::-webkit-scrollbar { display: none; }
.panel-head { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.panel-back { background: none; border: none; color: var(--text2); cursor: pointer; padding: 4px; display: flex; }
.panel-title { font-size: 15px; font-weight: 600; flex: 1; }

/* INFO BOXES */
.info-box { background: rgba(59,130,246,.08); border: 1px solid rgba(59,130,246,.2); border-radius: 8px; padding: 10px 12px; display: flex; gap: 8px; align-items: flex-start; margin-bottom: 8px; }
.warn-box { background: rgba(245,158,11,.08); border: 1px solid rgba(245,158,11,.2); border-radius: 8px; padding: 10px 12px; display: flex; gap: 8px; align-items: flex-start; margin-bottom: 8px; }
.success-box { background: rgba(16,185,129,.08); border: 1px solid rgba(16,185,129,.2); border-radius: 8px; padding: 10px 12px; display: flex; gap: 8px; align-items: flex-start; margin-bottom: 8px; }

/* CALENDAR */
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; margin-bottom: 8px; }
.cal-day-hdr { text-align: center; font-size: 9px; color: var(--text3); font-weight: 600; padding: 3px 0; text-transform: uppercase; }
.cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 11px; cursor: pointer; position: relative; color: var(--text2); transition: all .15s; }
.cal-day:hover { background: var(--bg3); }
.cal-day.today { background: var(--indigo); color: #fff; font-weight: 600; }
.cal-day.has-ev::after { content: ''; width: 3px; height: 3px; background: var(--amber); border-radius: 50%; position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%); }
.cal-day.today.has-ev::after { background: rgba(255,255,255,.7); }
.cal-day.sunday { color: var(--red); }

/* ON FIELD BANNER */
.on-field-banner { display: flex; align-items: center; gap: 10px; padding: 12px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 10px; transition: all .3s; }
.on-field-banner.active { background: rgba(16,185,129,.08); border-color: rgba(16,185,129,.3); }
.field-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--text3); flex-shrink: 0; transition: background .3s; }
.field-dot.active { background: var(--emerald); animation: pulse 1.5s infinite; }

/* VEHICLE SELECTOR */
.vehicle-opts { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.vehicle-opt { padding: 12px 8px; border: 2px solid var(--border); border-radius: 10px; text-align: center; cursor: pointer; transition: all .15s; }
.vehicle-opt.selected { border-color: var(--indigo); background: rgba(99,102,241,.1); }
.vehicle-opt i { font-size: 22px; display: block; margin-bottom: 4px; }
.vehicle-opt span { font-size: 9px; font-weight: 600; color: var(--text2); display: block; }
.vehicle-opt .rate { font-size: 10px; color: var(--indigo2); margin-top: 2px; font-weight: 600; }

/* RMKS BOX */
.rmk-box { background: var(--bg3); border-radius: 8px; padding: 10px; font-size: 11px; color: var(--text2); line-height: 1.6; }

/* LOADING */
.loading { display: flex; align-items: center; justify-content: center; padding: 32px 0; flex-direction: column; gap: 10px; }
.spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--indigo); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

/* EMPTY STATE */
.empty { text-align: center; padding: 40px 20px; }
.empty i { font-size: 36px; color: var(--text3); display: block; margin-bottom: 12px; }
.empty p { font-size: 13px; color: var(--text2); }
.empty small { font-size: 11px; color: var(--text3); display: block; margin-top: 4px; }

/* LOGIN */
#login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 32px 24px 32px; overflow-y: auto; }
#login-screen > div { width: 100%; max-width: 420px; margin: auto; }
.login-logo { width: 64px; height: 64px; background: var(--indigo); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 28px; color: #fff; margin: 0 auto 16px; }
.login-title { font-size: 24px; font-weight: 700; text-align: center; letter-spacing: -0.5px; }
.login-sub { font-size: 13px; color: var(--text2); text-align: center; margin-top: 4px; margin-bottom: 32px; }
.user-card { width: 100%; display: flex; align-items: center; gap: 12px; padding: 12px 14px; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 8px; cursor: pointer; transition: all .15s; background: var(--bg2); }
.user-card:active { transform: scale(.98); }
.user-card.selected { border-color: var(--indigo); background: rgba(99,102,241,.1); }
.user-card-av { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; color: #fff; flex-shrink: 0; }
.user-card-info { flex: 1; }
.user-card-name { font-size: 13px; font-weight: 500; }
.user-card-role { font-size: 11px; color: var(--text2); }

/* TOAST */
.toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 16px; font-size: 12px; font-weight: 500; z-index: 200; opacity: 0; transition: all .3s; white-space: nowrap; max-width: 300px; text-align: center; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { border-color: rgba(16,185,129,.4); color: #34D399; }
.toast.error { border-color: rgba(239,68,68,.4); color: #FCA5A5; }

/* SEARCH */
.search-wrap { position: relative; margin-bottom: 10px; }
.search-wrap i { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 16px; color: var(--text3); pointer-events: none; }

<script>
// PWA Install prompt
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  const banner = document.getElementById('install-banner');
  if(banner) banner.style.display = 'flex';
});
document.getElementById('install-btn')?.addEventListener('click', async () => {
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  const result = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('install-banner').style.display = 'none';
});
window.addEventListener('appinstalled', () => {
  document.getElementById('install-banner').style.display = 'none';
  deferredPrompt = null;
  showToast('App installed successfully ✓', 'success');
});

// iOS install hint — Apple's Safari doesn't support beforeinstallprompt, so PWAs
// are installed via Share → "Add to Home Screen". Show a guidance banner instead.
function dismissIosInstall(){
  const b=document.getElementById('ios-install-banner'); if(b) b.style.display='none';
  try{ localStorage.setItem('ffp_ios_install_dismissed','1'); }catch(e){}
}
(function(){
  const ua = navigator.userAgent || '';
  const isIOS = /iphone|ipad|ipod/i.test(ua) || (navigator.platform==='MacIntel' && navigator.maxTouchPoints>1);
  const isSafari = /safari/i.test(ua) && !/crios|fxios|edgios|android/i.test(ua);  // Add-to-Home-Screen is Safari-only on iOS
  const standalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone===true;
  let dismissed=false; try{ dismissed = localStorage.getItem('ffp_ios_install_dismissed')==='1'; }catch(e){}
  if(isIOS && isSafari && !standalone && !dismissed){
    const b=document.getElementById('ios-install-banner');
    if(b) b.style.display='flex';
  }
})();

// Register service worker
if('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    // Works for both root (Netlify) and subdirectory (GitHub Pages)
    const swPath = location.pathname.includes('/fieldforce') ? '/fieldforce/sw.js' : '/sw.js';
    navigator.serviceWorker.register(swPath)
      .then(reg => {
        reg.update();
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          window.location.reload();
        });
      })
      .catch(err => console.log('SW failed:', err));
  });
}
</script>

<script>
// ── CONFIG ───────────────────────────────────────────────────────────────────
const APP_VERSION = '5.5'; // bump this to force SW cache invalidation
const API = 'https://script.google.com/macros/s/AKfycbzag0WZE1koTtJHK33XqMOXxwa3yx7ToXcxQjWmmDEvWXl9xLL6pfV5CQc-qDWqL2HOTA/exec';
function getClaudeKey() { return localStorage.getItem('ffp_claude_key') || ''; }

// Route Claude API calls through Apps Script to avoid CORS
async function callClaudeViaProxy(messages, maxTokens=500) {

    model: 'claude-sonnet-4-5',
    max_tokens: maxTokens,
    messages
  };

    body: JSON.stringify(payload)
  });
  const d = await r.json();
  console.log('Proxy raw response:', JSON.stringify(d).slice(0,300));
  if(!d.success) throw new Error(d.error||'Claude proxy failed');
  // d.data is the Anthropic API response object
  return d.data;
}
const KM_RATES = { 'two-wheeler': 3.5, 'four-wheeler': 8, 'public-transport': 3.5 };

// ── MASTER DATA ───────────────────────────────────────────────────────────────
const INDUSTRIES = [
  'Airports',
  'Construction — Building Projects',
  'Construction — Metro Projects',
  'Construction — Rail Projects',
  'Construction — Roads and Bridges',
  'Construction — Others',
  'Facility Management Companies',

  'Manufacturing — FMCG',
  'Manufacturing — Food and Beverages',
  'Manufacturing — Solar',
  'Manufacturing — Tiles',
  'Manufacturing — Others',
  'Manpower Management Companies',
  'Power Distribution Company',
  'Power Plants',
  'Power Transmission',
  'PSUs',
  'Refinery',
  'Renewable Energy',
  'Road Asset Management Companies',
  'Smart Metering',
  'Other',
];

const PRIORITIES = ['A — High priority', 'B — Medium priority', 'C — Low priority'];
const PERIODS = ['Annual', 'Monthly', 'Weekly'];
const VISIT_STATUS = ['planned', 'in-progress', 'completed', 'not-visited', 'unplanned', 'cancelled'];
const PO_STATUS = ['pending', 'verified', 'rejected'];
const APPROVAL_STATUS = ['pending', 'approved', 'rejected'];
const TA_STATUS = ['submitted', 'approved', 'flagged'];
const VEHICLE_TYPES = ['two-wheeler', 'four-wheeler', 'public-transport'];
const USER_ROLES = ['rep', 'manager'];

// ── STATE ────────────────────────────────────────────────────────────────────
let STATE = {
  user: null,
  users: [], companies: [], targets: [], visits: [], planItems: [],
  contacts: [], pos: [], gpsLogs: [], taClaims: [], calEvents: [], approvals: [],
  rfqs: [], tasks: [],
  rfqSearch: '', rfqCatFilter: 'all', rfqRepFilter: 'all', rfqCoFilter: '', rfqCustFilter: '',
  ctSearch: '', ctCoFilter: '',
  coSearch: '', coIndustryFilter: 'all', coSort: 'alpha-asc',
  page: 'home', period: 'annual', cpf: 'all', pld: todayStr(), vd: todayStr(),
  exp: null, showAI: false, onField: false, fieldVehicle: null, viewRep: null,
  logView: 'mine', planView: 'mine', coView: 'all',
  calMonth: { y: new Date().getFullYear(), m: new Date().getMonth() },
  anMonth: { y: new Date().getFullYear(), m: new Date().getMonth() },  // Monthly Analysis page
  anRep: 'all',                                                        // Monthly Analysis rep filter
  gpsWatcher: null, gpsTrail: [], currentDayKm: 0, waypoints: [], stoppingField: false,
  gpsMgrMode: 'mine',    // manager GPS toggle: 'mine' | 'team'
};

// ── UTILS ────────────────────────────────────────────────────────────────────
function todayStr() { return new Date().toISOString().slice(0,10); }
function nowStr()   { return new Date().toTimeString().slice(0,5); }
function fmtDate(d) {
  if(!d) return '';
  const m = String(d).match(/^(\d{4})-(\d{2})-(\d{2})/);
  return m ? m[3]+'-'+m[2]+'-'+m[1] : String(d);
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function fmt(n) { n = Number(n)||0; if(n>=1e7) return '₹'+(n/1e7).toFixed(2)+'Cr'; if(n>=1e5) return '₹'+(n/1e5).toFixed(2)+'L'; if(n>=1e3) return '₹'+(n/1e3).toFixed(1)+'K'; return '₹'+n; }
function fmtINR(n) { return '₹'+Math.round(Number(n)||0).toLocaleString('en-IN'); }
function dsi(d) { if(!d) return null; return Math.floor((Date.now()-new Date(d))/86400000); }
function pbc(p) { return p>=80?'#10B981':p>=50?'#6366F1':p>=25?'#F59E0B':'#EF4444'; }
function pb(p, h=5) { return `<div class="pbar-wrap" style="height:${h}px"><div class="pbar" style="width:${Math.min(p,100)}%;height:${h}px;background:${pbc(p)}"></div></div>`; }
function pri(p) { return `<span class="p${p}">${p}</span>`; }
function dot(s) { const c={completed:'dot-green','in-progress':'dot-amber',planned:'dot-blue'}; return `<div class="dot ${c[s]||'dot-gray'}"></div>`; }
function sbg(s) { const m={completed:['badge-green','Done'],'in-progress':['badge-amber','Active'],planned:['badge-blue','Planned'],cancelled:['badge-red','Cancelled']}; const[c,l]=m[s]||['badge-gray',s]; return `<span class="badge ${c}">${l}</span>`; }
function calcInc(a) { a=Number(a)||0; if(a<=1e6) return 0; if(a<=3e6) return (a-1e6)*0.01; return 20000+(a-3e6)*0.015; }
function kmRate(vh) { return KM_RATES[vh]||3.5; }
function taAmt(km,vh) { return Math.round((Number(km)||0)*kmRate(vh)); }
function weekRange(d) { const dt=new Date(d); const day=dt.getDay(); const diff=day===0?-6:1-day; const mon=new Date(dt); mon.setDate(dt.getDate()+diff); const sat=new Date(mon); sat.setDate(mon.getDate()+5); return { start:mon.toISOString().slice(0,10), end:sat.toISOString().slice(0,10) }; }
function haversineKm(lat1,lon1,lat2,lon2) { const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180,a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2; return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)); }
function vehicleTag(vh) { if(vh==='four-wheeler') return `<span class="v-4w"><i class="ti ti-car" style="font-size:10px"></i>₹8/km</span>`; if(vh==='public-transport') return `<span class="v-pt"><i class="ti ti-bus" style="font-size:10px"></i>₹3.5/km</span>`; return `<span class="v-2w"><i class="ti ti-motorbike" style="font-size:10px"></i>₹3.5/km</span>`; }
function co(id) { return STATE.companies.find(c=>c.id===id)||{}; }
function rep(id) { return STATE.users.find(u=>u.id===id)||{}; }
function myReps() { return STATE.users.filter(u=>u.role==='rep'); }

// ── TOAST ────────────────────────────────────────────────────────────────────
function showToast(msg, type='') {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show '+(type||'');
  setTimeout(()=>t.className='toast',2500);
}

// ── API CALLS ────────────────────────────────────────────────────────────────
// ── CACHE ─────────────────────────────────────────────────────────────────────
const CACHE_TTL = 5 * 60 * 1000; // 5 minutes
const CACHE_PREFIX = 'ffp_c_';
function cacheSet(key, data) {
  try { localStorage.setItem(CACHE_PREFIX+key, JSON.stringify({data, ts: Date.now()})); } catch(e) {}
}
function cacheGet(key) {
  try {
    const raw = localStorage.getItem(CACHE_PREFIX+key);
    if(!raw) return null;
    const {data, ts} = JSON.parse(raw);
    if(Date.now()-ts > CACHE_TTL) return null;
    return data;
  } catch(e) { return null; }
}
function cacheInvalidate(sheet) {
  try { localStorage.removeItem(CACHE_PREFIX+sheet); } catch(e) {}
}

// ── API ───────────────────────────────────────────────────────────────────────
async function apiRead(sheet, {cache=true}={}) {
  if(cache) {
    const cached = cacheGet(sheet);
    if(cached) return cached;
  }
  try {
    const controller = new AbortController();
    const timeout = setTimeout(()=>controller.abort(), 20000);
    const r = await fetch(`${API}?action=read&sheet=${sheet}`, {signal:controller.signal});
    clearTimeout(timeout);
    const d = await r.json();
    const data = d.success ? d.data : [];
    if(cache && d.success) cacheSet(sheet, data);
    return data;
  } catch(e) {
    console.error('Read error',sheet,e?.name==='AbortError'?'(timeout)':e);
    // Always try stale cache as fallback — even if expired
    try {
      const raw = localStorage.getItem(CACHE_PREFIX+sheet);
      if(raw) { const {data}=JSON.parse(raw); if(data?.length) { console.log('Using stale cache for',sheet); return data; } }
    } catch(e2) {}
    return [];
  }
}

// Optimistic write — updates STATE immediately, saves in background
function apiWriteOptimistic(sheet, payload, stateArray, rollbackFn) {
  stateArray.push(payload);
  cacheSet(sheet, stateArray);
  apiWrite(sheet, payload).then(ok => {
    if(!ok && rollbackFn) { rollbackFn(); renderPage(STATE.page); }
  });
}

// Optimistic update — patches STATE immediately, saves in background
function apiUpdateOptimistic(sheet, payload, stateArray) {
  const item = stateArray.find(x=>x.id===payload.id);
  const snapshot = item ? {...item} : null;
  if(item) Object.assign(item, payload);
  cacheSet(sheet, stateArray);
  apiUpdate(sheet, payload).then(ok => {
    if(!ok && snapshot && item) { Object.assign(item, snapshot); renderPage(STATE.page); }
  });
}

async function apiWrite(sheet, payload) {
  try {
    const r = await fetch(`${API}?action=write&sheet=${sheet}`, { method:'POST', body:JSON.stringify(payload) });
    const d = await r.json();
    if(!d.success) showToast('Save failed: '+d.error,'error');
    else cacheInvalidate(sheet);
    return d.success;
  } catch(e) { showToast('Network error','error'); return false; }
}
async function apiDelete(sheetName, id) {
  try {
    const r = await fetch(`${API}?action=delete&sheet=${sheetName}`, {
      method: 'POST',
      body: JSON.stringify({id})
    });
    const d = await r.json();
    if(!d.success) throw new Error(d.error || 'Delete failed');
    return d;
  } catch(e) {
    throw e;   // re-throw so callers can roll back via .catch
  }
}

async function apiUpdate(sheet, payload) {
  try {
    const r = await fetch(`${API}?action=update&sheet=${sheet}`, { method:'POST', body:JSON.stringify(payload) });
    const d = await r.json();
    if(d.success) cacheInvalidate(sheet);
    return d.success;
  } catch(e) { return false; }
}

// ── DEBOUNCE ──────────────────────────────────────────────────────────────────
const _debounceTimers = {};
function debounce(key, fn, ms=200) {
  clearTimeout(_debounceTimers[key]);
  _debounceTimers[key] = setTimeout(fn, ms);
}

// ── BUTTON LOADING STATE ──────────────────────────────────────────────────────
// Universal async-action wrapper: locks the clicked button (spinner + label), runs
// the handler, then releases it. If the handler re-rendered the view, the button
// node is gone and we leave it; otherwise (or on error) we restore it.
async function act(btn, fn, label){
  if(btn && btn.dataset && btn.dataset.loading==='1') return;
  btnLoad(btn, true, label||'');
  try {
    await fn();
  } catch(e){
    console.error('action error:', e);
    showToast('Something went wrong — please try again','error');
    btnLoad(btn, false);
    return;
  }
  if(btn && document.body.contains(btn)) btnLoad(btn, false);
}

function btnLoad(el, loading=true, label='') {
  if(!el) return;
  if(loading) {
    if(el.dataset.loading==='1') return;            // already running — block re-entry
    el.dataset.origText = el.innerHTML;
    el.dataset.loading = '1';
    el.innerHTML = '<i class="ti ti-loader-2" style="animation:spin .6s linear infinite"></i>' + (label ? ' '+label : '');
    el.disabled = true;
  } else {
    el.innerHTML = el.dataset.origText || el.innerHTML;
    el.disabled = false;
    delete el.dataset.loading;
  }
}

// ── DATA LOADING ─────────────────────────────────────────────────────────────
function normDate(d) {
  if(!d) return '';
  if(d instanceof Date) return d.toISOString().slice(0,10);
  const s = String(d).trim();
  if(s.match(/^\d{2}\/\d{2}\/\d{4}$/)) { const [dd,mm,yyyy]=s.split('/'); return `${yyyy}-${mm}-${dd}`; }
  return s.slice(0,10);
}
function applyNorms(data) {
  data.visits?.forEach(v=>{ v.date=normDate(v.date); v.repId=String(v.repId||'').trim(); v.companyId=String(v.companyId||'').trim(); });
  data.planItems?.forEach(p=>{ p.date=normDate(p.date); p.repId=String(p.repId||'').trim(); p.companyId=String(p.companyId||'').trim(); p.status=String(p.status||'planned').trim(); });
  data.calEvents?.forEach(e=>{ e.date=normDate(e.date); e.repId=String(e.repId||'').trim(); });
  data.gpsLogs?.forEach(g=>{ g.date=normDate(g.date); g.repId=String(g.repId||'').trim(); });
}

// Priority sheets — loaded first (needed for home/nav render)
const PRIORITY_SHEETS = ['Users','Companies','Targets','Visits','VisitPlan','Contacts','RFQs','Settings'];
// Deferred sheets — loaded after first render
const DEFERRED_SHEETS = ['POs','GPSLogs','GPSLive','TAClaims','CalendarEvents','Approvals','Tasks','FieldStatus'];

async function loadAll(navigateAfter=false) {
  const CORE_SHEETS = ['Users','Companies','Targets','Visits','VisitPlan','Contacts','RFQs'];

  let preloaded = {};
  // Use preloaded data if available (fetched during login screen)
  if(_preloadPromise) {
    try { preloaded = await _preloadPromise; _preloadPromise = null; } catch(e) {}
  }

  // Only fetch sheets not already preloaded
  const toFetch = CORE_SHEETS.filter(s=>!preloaded[s]);
  let fetched = {};
  if(toFetch.length > 0) {
    const results = await Promise.allSettled(toFetch.map(s=>apiRead(s)));
    toFetch.forEach((s,i)=>{ if(results[i].status==='fulfilled') fetched[s]=results[i].value; });
  }

  const merged = {...preloaded, ...fetched};
  const [users,companies,targets,visits,planItems,contacts,rfqs] =
    CORE_SHEETS.map(s=>merged[s]||[]);

  const data = {visits:visits||[], planItems:planItems||[], calEvents:[], gpsLogs:[]};
  applyNorms(data);
  STATE.users = STATE.users?.length ? STATE.users : (users||[]); // keep existing users if already set
  STATE.companies=(companies||[]).filter(c=>String(c.active||'').trim().toUpperCase()!=='FALSE');
  STATE.targets=(targets||[]).filter(t=>String(t.active||'').trim().toUpperCase()!=='FALSE');
  STATE.visits=data.visits; STATE.planItems=data.planItems; STATE.contacts=contacts||[];
  STATE.rfqs=rfqs||[];
  if(!STATE.viewRep && STATE.user?.role==='manager') STATE.viewRep = myReps()[0]?.id;

  // Cache core sheets
  CORE_SHEETS.forEach(s=>{ if(merged[s]) cacheSet(s, merged[s]); });

  // Only navigate if the app shell is visible
  if(navigateAfter && document.getElementById('app')?.style.display==='flex') {
    navigate('home');
  }

  // Load Settings + deferred in background
  setTimeout(async () => {
    try {
      const settings = preloaded['Settings'] || await apiRead('Settings');
      if(settings?.length) {
        const keySetting = settings.find(r=>(r.key||r.Key||'').toLowerCase()==='claudekey');
        if(keySetting) { const val=keySetting.value||keySetting.Value||''; if(val) localStorage.setItem('ffp_claude_key',val); }
        cacheSet('Settings', settings);
      }
    } catch(e) {}

    const dResults = await Promise.allSettled(DEFERRED_SHEETS.map(s=>apiRead(s)));
    const [pos,gpsLogs,gpsLive,taClaims,calEvents,approvals,tasks,fieldStatus] = dResults.map(r=>r.status==='fulfilled'?r.value:[]);
    DEFERRED_SHEETS.forEach((s,i)=>{ if(dResults[i].status==='fulfilled') cacheSet(s,dResults[i].value); });
    const d2 = {visits:STATE.visits, planItems:STATE.planItems, calEvents:calEvents||[], gpsLogs:gpsLogs||[]};
    applyNorms(d2);
    STATE.pos=pos||[]; STATE.gpsLogs=d2.gpsLogs; STATE.gpsLive=gpsLive||[]; STATE.taClaims=taClaims||[];
    STATE.calEvents=d2.calEvents; STATE.approvals=approvals||[]; STATE.tasks=tasks||[];

    // Restore on-field state from FieldStatus sheet
    if(STATE.user && fieldStatus?.length) {
      const myStatus = fieldStatus.find(f=>f.repId===STATE.user.id);
      if(myStatus && String(myStatus.onField).toUpperCase()==='TRUE') {
        STATE.onField = true;
        STATE.fieldVehicle = myStatus.vehicle||'two-wheeler';
        // Restore waypoints from sheet if available
        if(myStatus.waypoints) {
          try {
            const saved = JSON.parse(myStatus.waypoints);
            if(Array.isArray(saved) && saved.length>0) {
              STATE.waypoints = saved;
            }
          } catch(e) {}
        }
        // Fallback: if no waypoints saved but we have start lat/lng, reconstruct start point
        if(!STATE.waypoints?.length && myStatus.lat) {
          STATE.waypoints = [{
            lat:Number(myStatus.lat), lng:Number(myStatus.lng),
            label:'Start', time:myStatus.time||'',
            companyId:null, companyName:'Start (Home/Office)'
          }];
        }
        showToast('On-field session restored ✓','success');
        if(['gps','teamgps','home'].includes(STATE.page)) renderPage(STATE.page);
      }
    }
    STATE.calEvents=d2.calEvents; STATE.approvals=approvals||[]; STATE.tasks=tasks||[];
    if(['gps','teamgps','cal','targets','tasks','contacts'].includes(STATE.page)) renderPage(STATE.page);
  }, 50);
}

// Load from cache instantly, then refresh in background
async function loadFromCacheOrFetch() {
  const CORE_SHEETS = ['Users','Companies','Targets','Visits','VisitPlan','Contacts','RFQs'];
  const coreMap = CORE_SHEETS.map(s=>cacheGet(s));
  const hasCache = coreMap.every(d=>d!==null);

  if(hasCache) {
    const [users,companies,targets,visits,planItems,contacts,rfqs] = coreMap;
    const data = {visits:[...visits], planItems:[...planItems], calEvents:[], gpsLogs:[]};
    applyNorms(data);
    STATE.users=users;
    STATE.companies=companies.filter(c=>String(c.active||'').trim().toUpperCase()!=='FALSE');
    STATE.targets=targets.filter(t=>String(t.active||'').trim().toUpperCase()!=='FALSE');
    STATE.visits=data.visits; STATE.planItems=data.planItems; STATE.contacts=contacts;
    STATE.rfqs=rfqs||[]; STATE.pos=[]; STATE.gpsLogs=[]; STATE.taClaims=[]; STATE.calEvents=[]; STATE.approvals=[]; STATE.tasks=[];
    if(!STATE.viewRep && STATE.user.role==='manager') STATE.viewRep = myReps()[0]?.id;
    DEFERRED_SHEETS.forEach(s=>{ const c=cacheGet(s); if(c) {
      if(s==='POs') STATE.pos=c;
      if(s==='GPSLogs') { c.forEach(g=>g.date=normDate(g.date)); STATE.gpsLogs=c; }
      if(s==='TAClaims') STATE.taClaims=c;
      if(s==='CalendarEvents') { c.forEach(e=>e.date=normDate(e.date)); STATE.calEvents=c; }
      if(s==='Approvals') STATE.approvals=c;
      if(s==='Tasks') STATE.tasks=c;
    }});
    navigate('home');
    loadAll(false).then(()=>renderPage(STATE.page)).catch(()=>{});
  } else {
    // No cache — show skeleton, load data, then navigate
    showSkeleton();
    await loadAll(false);
    navigate('home');
  }
}

function showSkeleton() {
  const homePage = document.getElementById('page-home');
  if(!homePage) return;
  if(homePage.innerHTML.trim().length > 50) return;
  const skeletonCard = '<div style="background:var(--bg2);border-radius:12px;padding:16px;margin-bottom:12px"><div style="background:var(--bg3);border-radius:6px;height:14px;width:60%;margin-bottom:10px;animation:pulse 1.2s infinite"></div><div style="background:var(--bg3);border-radius:6px;height:10px;width:80%;margin-bottom:6px;animation:pulse 1.2s infinite"></div><div style="background:var(--bg3);border-radius:6px;height:10px;width:40%;animation:pulse 1.2s infinite"></div></div>';
  homePage.innerHTML = '<div style="padding:16px">' + skeletonCard + skeletonCard + skeletonCard + '</div>';
}

async function refreshData(btn) {
  if(btn) btnLoad(btn, true);
  // Clear cache so fresh data is fetched
  PRIORITY_SHEETS.concat(DEFERRED_SHEETS).forEach(s=>cacheInvalidate(s));
  showToast('Refreshing...','');
  await loadAll();
  renderPage(STATE.page);
  showToast('Data refreshed ✓','success');
  if(btn) btnLoad(btn, false);
}
let selectedLoginId = null;
let _preloadPromise = null; // pre-fetched data while on login screen

let _pinUser = null;       // user awaiting PIN entry / setup
function effectivePin(u){ return (u && u.pin && String(u.pin).trim()) || '1234'; }
function needsPinSetup(u){ return effectivePin(u) === '1234'; }

function renderLoginCards() {
  const el = document.getElementById('user-list-login');

async function initLogin() {
  const users = await apiRead('Users');
  STATE.users = users;

  // Preload other sheets in the background so data is ready by login time.
  const PRELOAD_SHEETS = ['Companies','Targets','Visits','VisitPlan','Contacts','RFQs','Settings'];
  _preloadPromise = Promise.allSettled(PRELOAD_SHEETS.map(s=>apiRead(s)))
    .then(results => {
      const obj = {};
      PRELOAD_SHEETS.forEach((s,i)=>{ if(results[i].status==='fulfilled') obj[s]=results[i].value; });
      return obj;
    }).catch(()=>({}));

  renderLoginCards();

  // Remembered session — re-enter via saved id, but still force PIN setup if never set.
  const savedId = localStorage.getItem('ffp_user_id');
  if(savedId && users.find(u=>u.id===savedId)) {
    selectedLoginId = savedId;
    await doLogin(true);
  }
}

function selectLoginUser(id, el) {
  selectedLoginId = id;
  document.querySelectorAll('.user-card').forEach(c=>c.classList.remove('selected'));
  document.querySelectorAll('[id^="chk-"]').forEach(c=>c.style.display='none');
  el.classList.add('selected');
  const chk = document.getElementById('chk-'+id);
  if(chk) chk.style.display='block';
}

// Step 1 — validate the selected profile, then gate on PIN.
async function doLogin(silent=false) {
  if(!selectedLoginId) { showToast('Please select a profile','error'); return; }
  const u = STATE.users.find(x=>x.id===selectedLoginId);
  if(!u) { showToast('User not found','error'); return; }
  if(silent && !needsPinSetup(u)) { return completeLogin(u); }  // remembered + PIN already set
  showPinStep(u);
}

// Step 2 — PIN entry overlay.
function showPinStep(u) {
  _pinUser = u;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  const ov = document.getElementById('pin-overlay');
  const first = needsPinSetup(u);
  ov.innerHTML = `
    <div style="width:100%;max-width:340px;margin:auto;text-align:center">
      <div class="user-card-av" style="width:56px;height:56px;font-size:20px;margin:0 auto 12px;background:${u.role==='manager'?'#6366F1':'#10B981'}">${u.avatar||u.name.slice(0,2).toUpperCase()}</div>
      <div style="font-size:18px;font-weight:700">${u.name}</div>
      <div class="text-sm" style="margin-bottom:20px">${u.role==='manager'?'Manager':'Sales Rep'}</div>
      <div class="inp-label" style="text-align:left;margin-bottom:6px">Enter your 4-digit PIN</div>
      <input id="pin-input" type="password" inputmode="numeric" autocomplete="off" maxlength="4" class="inp"
        style="text-align:center;letter-spacing:10px;font-size:22px;padding:12px"
        oninput="this.value=this.value.replace(/[^0-9]/g,'');if(this.value.length===4)verifyPin()" />
      <div id="pin-msg" style="font-size:11px;color:#FCA5A5;min-height:16px;margin-top:8px"></div>
      ${first?`<div class="info-box" style="margin-top:6px;text-align:left"><i class="ti ti-info-circle" style="color:var(--blue);font-size:15px;flex-shrink:0"></i><div class="text-xs" style="color:#93C5FD">First time signing in? Your temporary PIN is <b>1234</b> — you'll set your own next.</div></div>`:''}
      <button class="btn btn-primary btn-full" style="margin-top:14px" onclick="verifyPin()">Continue</button>
      <button class="btn btn-full" style="margin-top:8px;background:none;border:none;color:var(--text3)" onclick="hidePinOverlay()">&larr; Choose a different profile</button>
    </div>`;
  ov.style.display = 'flex';
  setTimeout(()=>{ const el=document.getElementById('pin-input'); if(el) el.focus(); }, 60);
}

function hidePinOverlay() {
  const ov = document.getElementById('pin-overlay');
  if(ov){ ov.style.display='none'; ov.innerHTML=''; }
  _pinUser = null;
  renderLoginCards();
}
function hidePinOverlayQuiet() {
  const ov = document.getElementById('pin-overlay');
  if(ov){ ov.style.display='none'; ov.innerHTML=''; }
}

function verifyPin() {
  const u = _pinUser; if(!u) return;
  const inp = document.getElementById('pin-input');
  const val = ((inp && inp.value) || '').trim();
  const msg = document.getElementById('pin-msg');
  if(val.length !== 4){ if(msg) msg.textContent='Enter all 4 digits'; return; }
  if(val !== effectivePin(u)){
    if(msg) msg.textContent='Incorrect PIN — try again';
    if(inp){ inp.value=''; inp.focus(); }
    return;
  }
  if(needsPinSetup(u)) { showSetPinStep(u); return; }   // temporary PIN → force a change
  completeLogin(u);
}

// Step 3 (first login / after reset) — choose a new PIN.
function showSetPinStep(u) {
  const ov = document.getElementById('pin-overlay');
  ov.innerHTML = `
    <div style="width:100%;max-width:340px;margin:auto;text-align:center">
      <div class="login-logo" style="width:52px;height:52px;font-size:22px;margin:0 auto 12px"><i class="ti ti-lock"></i></div>
      <div style="font-size:18px;font-weight:700">Set your PIN</div>
      <div class="text-sm" style="margin-bottom:18px">Choose a new 4-digit PIN for ${u.name.split(' ')[0]}</div>
      <div class="inp-label" style="text-align:left;margin-bottom:6px">New PIN</div>
      <input id="pin-new" type="password" inputmode="numeric" autocomplete="off" maxlength="4" class="inp"
        style="text-align:center;letter-spacing:10px;font-size:22px;padding:12px;margin-bottom:12px" oninput="this.value=this.value.replace(/[^0-9]/g,'')" />
      <div class="inp-label" style="text-align:left;margin-bottom:6px">Confirm PIN</div>
      <input id="pin-confirm" type="password" inputmode="numeric" autocomplete="off" maxlength="4" class="inp"
        style="text-align:center;letter-spacing:10px;font-size:22px;padding:12px" oninput="this.value=this.value.replace(/[^0-9]/g,'')" />
      <div id="pin-msg" style="font-size:11px;color:#FCA5A5;min-height:16px;margin-top:8px"></div>
      <button class="btn btn-primary btn-full" style="margin-top:8px" onclick="act(this,()=>saveNewPin(),'Saving…')">Save &amp; continue</button>
    </div>`;
  setTimeout(()=>{ const el=document.getElementById('pin-new'); if(el) el.focus(); }, 60);
}

async function saveNewPin() {
  const u = _pinUser; if(!u) return;
  const a = ((document.getElementById('pin-new')||{}).value)||'';
  const b = ((document.getElementById('pin-confirm')||{}).value)||'';
  const msg = document.getElementById('pin-msg');
  const fail = t => { if(msg) msg.textContent=t; };
  if(a.length!==4) return fail('PIN must be 4 digits');
  if(a==='1234') return fail('Please choose a PIN other than 1234');
  if(a!==b) return fail('PINs do not match');
  const ok = await apiUpdate('Users', {id:u.id, pin:a});
  if(!ok) return fail('Could not save — please try again');
  u.pin = a;
  const su = STATE.users.find(x=>x.id===u.id); if(su) su.pin = a;
  showToast('PIN set \u2713','success');
  completeLogin(u);
}

// Final step — enter the app.
async function completeLogin(u) {
  _pinUser = null;
  STATE.user = u;
  selectedLoginId = u.id;
  localStorage.setItem('ffp_user_id', u.id);
  hidePinOverlayQuiet();
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('top-av').textContent = u.avatar||u.name.slice(0,2).toUpperCase();
  document.getElementById('top-av').style.background = u.role==='manager'?'#6366F1':'#10B981';
  renderNav();
  updateNotifDot();
  await new Promise(r=>setTimeout(r,50));
  try {
    await loadFromCacheOrFetch();
  } catch(e) {
    console.error('Login load error:', e.message);
    if(document.getElementById('page-home')) navigate('home');
  }
}

function logout() {
  if(confirm('Log out?')) {
    localStorage.removeItem('ffp_user_id');
    STATE.user=null;
    selectedLoginId=null;
    _pinUser=null;
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('app').style.display='none';
    stopGPS();
    initLogin();
  }
}

// Manager: reset a rep's PIN back to the temporary 1234 (they set a new one next login).
async function resetRepPin(repId) {
  const r = rep(repId);
  if(!confirm(`Reset ${(r&&r.name)||'this rep'}'s PIN to 1234? They'll be asked to set a new one on next login.`)) return;

}

function toggleMobileDrawer() {
  const drawer = document.getElementById('mobile-drawer');
  const overlay = document.getElementById('mobile-drawer-overlay');
  const isOpen = drawer.classList.contains('open');
  drawer.classList.toggle('open', !isOpen);
  overlay.classList.toggle('open', !isOpen);
}

function navigate(p) {
  // Close mobile drawer if open
  document.getElementById('mobile-drawer')?.classList.remove('open');
  document.getElementById('mobile-drawer-overlay')?.classList.remove('open');
  STATE.page=p; closeAllPanels();
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  const pg=document.getElementById('page-'+p); if(pg) pg.classList.add('active');
  renderPage(p);
  // Update active state on both nav types
  document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));

// ── COMPANIES ─────────────────────────────────────────────────────────────────
// HIERARCHY: Annual = all companies. Monthly ⊂ Annual. Weekly ⊂ Monthly ⊂ Annual.
// "period" stored on the target row = the HIGHEST priority period for that company.
// weekly implies monthly implies annual.
// So: Annual tab = all; Monthly tab = companies with monthly OR weekly target; Weekly tab = companies with weekly target.

function coIsInPeriod(cId, myT, period) {
  const t = myT.filter(t=>t.companyId===cId);
  if(!t.length) return false;
  if(period==='annual'||period==='all') return true;
  if(period==='monthly') return t.some(x=>x.period==='monthly'||x.period==='weekly');
  if(period==='weekly') return t.some(x=>x.period==='weekly');
  return false;
}

function renderCompanies() {
  const el = document.getElementById('page-companies');
  const isM = STATE.user.role==='manager';
  if(!STATE.coSearch) STATE.coSearch='';
  if(!STATE.coIndustryFilter) STATE.coIndustryFilter='all';

  // Rep can browse the full company DB ("All companies") to add to their own targets.
  const repAllMode = !isM && STATE.coView==='all';

  // Filter targets based on coView
  let myT;
  if(!isM) {
    myT = STATE.targets.filter(t=>t.repId===STATE.user.id);   // rep's own targets (for value display)
  } else if(STATE.coView==='mine') {
    myT = STATE.targets.filter(t=>t.repId===STATE.user.id);
  } else if(STATE.coView==='all') {
    myT = STATE.targets;
  } else {
    myT = STATE.targets.filter(t=>t.repId===STATE.coView);
  }

  // Company source: rep "All companies" = whole DB; otherwise = companies that have a target in scope.
  let allCos;
  if(repAllMode) {
    allCos = STATE.companies.slice();
  } else {
    const allCIds = [...new Set(myT.map(t=>t.companyId))];
    allCos = allCIds.map(id=>STATE.companies.find(c=>c.id===id)).filter(Boolean);
  }

  // Filter by period using hierarchy (skip in rep all-companies browse — show everything).
  let cos = (repAllMode || STATE.period==='annual' || STATE.period==='all')
    ? allCos
    : allCos.filter(c=>coIsInPeriod(c.id, myT, STATE.period));

  // Filter by priority chip
  if(STATE.cpf!=='all') cos=cos.filter(c=>c.priority===STATE.cpf);

  // Filter by industry
  if(STATE.coIndustryFilter!=='all') cos=cos.filter(c=>(c.industry||'')=== STATE.coIndustryFilter);

  // Filter by search
  if(STATE.coSearch.trim()) {
    const q=STATE.coSearch.trim().toLowerCase();
    cos=cos.filter(c=>(c.name||'').toLowerCase().includes(q)||(c.address||'').toLowerCase().includes(q)||(c.industry||'').toLowerCase().includes(q));
  }

  // Sort
  if(!STATE.coSort) STATE.coSort='alpha-asc';
  const priOrder={'A':0,'B':1,'C':2};
  cos = [...cos].sort((a,b)=>{
    switch(STATE.coSort) {
      case 'alpha-asc':  return (a.name||'').localeCompare(b.name||'');
      case 'alpha-desc': return (b.name||'').localeCompare(a.name||'');
      case 'biz-asc':    return Number(a.totalBusiness||0)-Number(b.totalBusiness||0);
      case 'biz-desc':   return Number(b.totalBusiness||0)-Number(a.totalBusiness||0);
      case 'pri-asc':    return (priOrder[a.priority]??2)-(priOrder[b.priority]??2);
      case 'pri-desc':   return (priOrder[b.priority]??2)-(priOrder[a.priority]??2);
      default:           return (a.name||'').localeCompare(b.name||'');
    }
  });

  function getBestTarget(cId, period) {
    const t = myT.filter(t=>t.companyId===cId);
    if(period==='annual'||period==='all') return t.find(x=>x.period==='annual')||t[0];
    if(period==='monthly') return t.find(x=>x.period==='monthly')||t.find(x=>x.period==='weekly')||t[0];
    if(period==='weekly') return t.find(x=>x.period==='weekly');
    return t[0];
  }

  const summaryTargets = cos.map(c=>getBestTarget(c.id,STATE.period)).filter(Boolean);
  const tot = summaryTargets.reduce((s,t)=>s+Number(t?.saleTarget||0),0);

  const periodDesc = {annual:'All your target companies',monthly:'Companies you are targeting this month',weekly:'Companies you are focusing on this week',all:'All your target companies'}[STATE.period];

  // Build industry list from data
  const allIndustries = [...new Set(allCos.map(c=>c.industry).filter(Boolean))].sort();
  const activeSecondaryFilters = (STATE.coIndustryFilter!=='all'?1:0);

  const sortLabels = {'alpha-asc':'A → Z','alpha-desc':'Z → A','biz-desc':'Business ↓','biz-asc':'Business ↑','pri-asc':'Priority ↑','pri-desc':'Priority ↓'};

  el.innerHTML = `
    <div class="row-between" style="margin-bottom:12px">
      <div style="font-size:16px;font-weight:600">Target Companies</div>
      <div class="row" style="gap:6px">
        ${isM?viewSwitcherHtml('coView', STATE.coView||'all', 'renderCompanies()'):`<div style="display:inline-flex;background:var(--bg3);border-radius:8px;padding:2px">
          <button class="seg-tab${(STATE.coView||'mine')!=='all'?' active':''}" style="flex:none;padding:5px 10px;font-size:11px" onclick="STATE.coView='mine';STATE.exp=null;renderCompanies()">My</button>
          <button class="seg-tab${STATE.coView==='all'?' active':''}" style="flex:none;padding:5px 10px;font-size:11px" onclick="STATE.coView='all';STATE.exp=null;renderCompanies()">All</button>
        </div>`}
        <button class="btn btn-primary btn-sm" onclick="openAddCompanyPanel()"><i class="ti ti-plus"></i> Add</button>
      </div>

      <button class="seg-tab${STATE.period==='monthly'?' active':''}" onclick="STATE.period='monthly';STATE.exp=null;renderCompanies()">Monthly</button>

async function addFocusPeriod(coId, period) {
  const isM = STATE.user.role==='manager';
  const repId = isM ? STATE.viewRep||STATE.user.id : STATE.user.id;
  // Copy target details from annual target
  const annualT = STATE.targets.find(t=>t.companyId===coId&&t.repId===repId&&t.period==='annual');
  const t = {
    id:uid(), companyId:coId, repId,
    period, periodValue: period==='weekly'?weekRange(todayStr()).start:new Date().toISOString().slice(0,7),
    saleTarget: annualT?.saleTarget||0,
    items: annualT?.items||'',
    goals: annualT?.goals||'',
    achieved:0, approvedBy: isM?STATE.user.id:''
  };
  showToast('Adding to '+period+' targets...','');
  const ok = await apiWrite('Targets',t);
  if(ok){
    STATE.targets.push(t);
    // if adding to weekly, also ensure monthly exists
    if(period==='weekly'){
      const hasMonthly = STATE.targets.some(x=>x.companyId===coId&&x.repId===repId&&x.period==='monthly');
      if(!hasMonthly){
        const mt={...t,id:uid(),period:'monthly',periodValue:new Date().toISOString().slice(0,7)};
        await apiWrite('Targets',mt);
        STATE.targets.push(mt);
      }
    }
    showToast(`Added to ${period} targets ✓`,'success');
    renderCompanies();
  }
}

async function addToMyCompanies(coId) {
  // Add annual target for the current user (rep or manager) themselves.
  const existing = STATE.targets.find(t=>t.companyId===coId&&t.repId===STATE.user.id&&t.period==='annual');
  if(existing){ showToast('Already in your companies',''); return; }
  const t = {
    id:uid(), companyId:coId, repId:STATE.user.id,
    period:'annual', periodValue:'2025',
    saleTarget:0, items:'', goals:'', achieved:0, approvedBy:STATE.user.id
  };
  const ok = await apiWrite('Targets',t);
  if(ok){
    STATE.targets.push(t);
    // Keep Companies.assignedReps in sync so this company shows in the user's Add Visit / Add RFQ pickers.
    const c = STATE.companies.find(x=>x.id===coId);
    if(c){
      const set = new Set(String(c.assignedReps||'').split(',').map(s=>s.trim()).filter(Boolean));
      if(!set.has(STATE.user.id)){ const ar=[...set, STATE.user.id].join(','); c.assignedReps=ar; apiUpdate('Companies',{id:coId, assignedReps:ar}); }
    }
    showToast('Added to your companies ✓','success');
    renderCompanies();
  }
}

async function addToMyCompaniesAndClose(coId){ await addToMyCompanies(coId); closePanel('addco'); }

function checkDuplicateCompany(val) {
  const list = document.getElementById('aco-dup-list');
  if(!list) return;
  const q = val.trim().toLowerCase();
  if(q.length < 2){ list.style.display='none'; return; }
  const matches = STATE.companies.filter(c=>(c.name||'').toLowerCase().includes(q)).slice(0,5);
  if(!matches.length){ list.style.display='none'; return; }
  list.style.display='block';
  list.innerHTML = matches.map(c=>{
    const assignedReps = [...new Set(STATE.targets.filter(t=>t.companyId===c.id).map(t=>t.repId).filter(Boolean))].map(rid=>{const r=rep(rid);return r&&r.name?r.name.split(' ')[0]:null;}).filter(Boolean).join(', ');
    const alreadyMine = STATE.targets.some(t=>t.companyId===c.id&&t.repId===STATE.user.id);
    const actionBtn = STATE.user.role==='manager'
      ? `<button class="btn btn-sm btn-primary" style="font-size:10px" onclick="assignExistingCompany('${c.id}')"><i class="ti ti-user-plus"></i> Assign this company to a rep instead</button>`
      : (alreadyMine
          ? `<span class="badge badge-green" style="font-size:9px"><i class="ti ti-check" style="font-size:10px"></i> Already in your companies</span>`
          : `<button class="btn btn-sm btn-primary" style="font-size:10px" onclick="act(this,()=>addToMyCompaniesAndClose('${c.id}'),'Adding…')"><i class="ti ti-plus"></i> Add to my target companies</button>`);
    return `<div style="padding:10px 12px;border-bottom:1px solid var(--border)">
      <div style="font-size:11px;font-weight:600;color:var(--amber);margin-bottom:2px">⚠ Already exists: ${c.name}</div>
      <div style="font-size:10px;color:var(--text3);margin-bottom:6px">${c.address||''} ${assignedReps?'· Assigned to: '+assignedReps:''}</div>
      ${actionBtn}
    </div>`;
  }).join('');
}

async function saveAssignExisting(coId, repElId, tgtElId) {
  const repId = document.getElementById(repElId||'aec-rep')?.value;
  const period = document.getElementById('aec-period')?.value||'annual';
  const saleTarget = document.getElementById(tgtElId||'aec-tgt')?.value||0;
  const items = document.getElementById('aec-items')?.value||'';
  if(!repId){ showToast('Select a rep','error'); return; }
  const existing = STATE.targets.find(t=>t.companyId===coId&&t.repId===repId&&t.period===period);
  if(existing){ showToast('Already assigned to this rep for this period',''); closePanel('addco'); return; }
  const t = {
    id:uid(), companyId:coId, repId,
    period, periodValue: period==='annual'?'2025':period==='weekly'?weekRange(todayStr()).start:new Date().toISOString().slice(0,7),
    saleTarget:Number(saleTarget), items, goals:'', achieved:0, approvedBy:STATE.user.id
  };
  const ok = await apiWrite('Targets',t);
  if(ok){
    STATE.targets.push(t);
    showToast('Company assigned ✓','success');
    closePanel('addco');
    renderCompanies();
  }
}

function toggleRepTarget(repId, checked) {

async function saveCompanyManager() {
  const name = document.getElementById('aco-name').value.trim();
  const addr = document.getElementById('aco-addr').value.trim();
  if(!name||!addr){showToast('Company name and address are required','error');return;}

  let industry = document.getElementById('aco-ind').value;
  if(!industry){showToast('Please select an industry','error');return;}
  if(industry==='Other'){
    const desc = document.getElementById('aco-ind-desc')?.value.trim();
    if(desc) industry = `Other — ${desc}`;
  }

  // Get checked reps
  const checkedReps = [...document.querySelectorAll('input[name="aco-reps"]:checked')].map(el=>el.value);
  if(!checkedReps.length){showToast('Please assign at least one rep','error');return;}

  showToast('Saving...','');
  const cId = uid();
  const coObj = {
    id:cId, name, address:addr,
    region:document.getElementById('aco-region').value,
    industry,
    priority:document.getElementById('aco-pri').value,
    assignedReps:checkedReps.join(','),
    lastVisited:'', totalBusiness:0,
    addedBy:STATE.user.id, active:'TRUE'
  };
  const ok = await apiWrite('Companies', coObj);
  if(!ok){showToast('Failed to save company','error');return;}
  STATE.companies.push(coObj);

  // Save targets for each checked rep that has a target amount
  for(const rId of checkedReps){
    const tgt = document.getElementById('aco-tgt-'+rId)?.value;
    const items = document.getElementById('aco-items-'+rId)?.value||'';
    const goals = document.getElementById('aco-goals-'+rId)?.value||'';
    const period = document.getElementById('aco-period-'+rId)?.value||'annual';
    const t = {
      id:uid(), companyId:cId, repId:rId,
      period, periodValue:'2025',
      saleTarget:tgt||0, items, goals,
      achieved:0, approvedBy:STATE.user.id
    };
    await apiWrite('Targets',t);
    STATE.targets.push(t);
  }

  showToast(`${name} added — ${checkedReps.length} rep${checkedReps.length>1?'s':''} assigned ✓`,'success');
  // Save contacts
  const contacts = getContactRows('aco-contacts-list');
  if(contacts.length) await saveContactsForCompany(cId, contacts);
  closePanel('addco');
  renderCompanies();
}

async function saveCompanyRep() {
  const name = document.getElementById('aco-name').value.trim();
  const addr = document.getElementById('aco-addr').value.trim();
  if(!name||!addr){showToast('Company name and address are required','error');return;}

  let industry = document.getElementById('aco-ind').value||'';
  if(industry==='Other'){
    const desc = document.getElementById('aco-ind-desc')?.value.trim();
    if(desc) industry = `Other — ${desc}`;
  }

  showToast('Saving...','');
  const cId = uid();
  const coObj = {
    id:cId, name, address:addr,
    region:document.getElementById('aco-region').value,
    industry,
    priority:document.getElementById('aco-pri').value,
    assignedReps:STATE.user.id,
    lastVisited:'', totalBusiness:0,
    addedBy:STATE.user.id, active:'TRUE'
  };
  const ok = await apiWrite('Companies',coObj);
  if(!ok){showToast('Failed to save company','error');return;}
  STATE.companies.push(coObj);

  // Always create annual target (every company is in annual)
  const selectedPeriod = document.getElementById('aco-period').value;
  const tgt = document.getElementById('aco-tgt')?.value;
  const items = document.getElementById('aco-items').value;
  const goals = document.getElementById('aco-goals').value;

  // Annual target — always created
  const annualT = {
    id:uid(), companyId:cId, repId:STATE.user.id,
    period:'annual', periodValue:'2025',
    saleTarget:tgt||0, items, goals, achieved:0, approvedBy:''
  };
  await apiWrite('Targets',annualT);
  STATE.targets.push(annualT);

  // If rep selected monthly or weekly, create those too (hierarchy)
  if(selectedPeriod==='monthly'||selectedPeriod==='weekly'){
    const mt={...annualT,id:uid(),period:'monthly',periodValue:new Date().toISOString().slice(0,7)};
    await apiWrite('Targets',mt);STATE.targets.push(mt);
  }
  if(selectedPeriod==='weekly'){
    const wt={...annualT,id:uid(),period:'weekly',periodValue:weekRange(todayStr()).start};
    await apiWrite('Targets',wt);STATE.targets.push(wt);
  }

  showToast(`${name} added ✓`,'success');
  // Save contacts
  const contacts = getContactRows('aco-contacts-list');
  if(contacts.length) await saveContactsForCompany(cId, contacts);
  closePanel('addco');
  renderCompanies();
}

function showAddContactToCompany(coId) {
  const form = document.getElementById('add-contact-form-'+coId);

async function saveNewContactToCompany(coId) {
  const name = document.getElementById('nc-name-'+coId)?.value?.trim();
  if(!name){showToast('Name is required','error');return;}
  await saveContactsForCompany(coId,[{
    name,
    designation: document.getElementById('nc-desig-'+coId)?.value?.trim()||'',
    phone: document.getElementById('nc-phone-'+coId)?.value?.trim()||'',
    email: document.getElementById('nc-email-'+coId)?.value?.trim()||'',
  }]);
  showToast('Contact saved ✓','success');
  // Refresh the company detail panel
  openCoDetail(coId);
}

function escAtt(s) { return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

// Dispatcher — managers delete directly, reps send a request.
async function removeContact(ctId, coId) {
  const ct = STATE.contacts.find(x=>x.id===ctId);
  if(!ct) return;
  if(STATE.user.role==='manager') {
    if(!confirm(`Remove "${ct.name}" from this company?`)) return;
    // Optimistic: update STATE and re-render immediately, delete from sheet in background.
    STATE.contacts = STATE.contacts.filter(x=>x.id!==ctId);
    openCoDetail(coId);
    showToast('Contact removed ✓','success');
    apiDelete('Contacts', ctId).catch(()=>{
      STATE.contacts.push(ct);   // rollback on server error
      openCoDetail(coId);
      showToast('Could not delete — please try again','error');
    });
  } else {
    const reason = prompt(`Why do you want to remove "${ct.name}"?\n(Your manager will be asked to approve this.)`);
    if(!reason) return;
    const ar = {
      id: uid(), type: 'remove_contact',
      repId: STATE.user.id, companyId: coId,
      poId: ctId,
      reason, status: 'pending',
      requestDate: todayStr(), resolvedBy: '', resolvedDate: ''
    };
    STATE.approvals.push(ar);
    await apiWrite('Approvals', ar);
    showToast('Removal request sent to manager ✓','success');
  }
}

async function saveEditContact(ctId, coId) {
  const name = document.getElementById('ect-name-'+ctId)?.value?.trim();
  if(!name){ showToast('Name is required','error'); return; }
  const patch = {
    id: ctId,
    name,
    designation: document.getElementById('ect-desig-'+ctId)?.value?.trim()||'',
    phone:       document.getElementById('ect-phone-'+ctId)?.value?.trim()||'',
    email:       document.getElementById('ect-email-'+ctId)?.value?.trim()||''
  };
  const ct = STATE.contacts.find(x=>x.id===ctId);
  if(ct) Object.assign(ct, patch);
  await apiUpdate('Contacts', patch);
  showToast('Contact updated ✓','success');
  openCoDetail(coId);   // re-render the company panel with fresh data
}

async function saveReassignCompany(coId, btn) {
  const sel = document.querySelector('input[name="reassign-rep"]:checked');
  if(!sel){ showToast('Select a rep or Unassigned','error'); return; }
  const newRepId = sel.value==='__unassigned__' ? '' : sel.value;
  const c = STATE.companies.find(x=>x.id===coId);
  btnLoad(btn, true, 'Reassigning…');

  try {
    // 1. Move every target row for this company to the new rep (or blank it out).
    const coTargets = STATE.targets.filter(t=>t.companyId===coId);
    for(const t of coTargets){
      await apiUpdate('Targets',{id:t.id, repId:newRepId});
      t.repId = newRepId;
    }

    // 2. If assigning to a rep who now has no annual row, create a minimal one
    //    so the company actually appears in their list.
    if(newRepId && !coTargets.some(t=>String(t.repId).trim()===newRepId && t.period==='annual')){
      const annualT = { id:uid(), companyId:coId, repId:newRepId, period:'annual',
        periodValue:'2025', saleTarget:0, items:'', goals:'', achieved:0, approvedBy:STATE.user.id };
      await apiWrite('Targets', annualT);
      STATE.targets.push(annualT);
    }

    // 3. Keep Companies.assignedReps in sync — this is what the rep-side
    //    Add Visit / Add RFQ dropdowns read, so it must match the targets.
    await apiUpdate('Companies',{id:coId, assignedReps:newRepId});
    if(c) c.assignedReps = newRepId;

    showToast(newRepId?`Reassigned to ${rep(newRepId)?.name} ✓`:'Set to unassigned ✓','success');
    openCoDetail(coId);   // re-renders the panel — the loading button is replaced
    if(STATE.page==='companies') renderCompanies();
  } catch(e) {
    btnLoad(btn, false);  // release only on failure; success swaps the whole panel
    showToast('Reassignment failed — please try again','error');
  }
}

async function updateTarget(tId) {
  const newTgt=document.getElementById('et-tgt-'+tId).value;
  if(!newTgt){showToast('Enter a target amount','error');return;}
  await apiUpdate('Targets',{id:tId,saleTarget:newTgt});
  const t=STATE.targets.find(x=>x.id===tId);if(t)t.saleTarget=newTgt;
  showToast('Target updated ✓','success');
}

async function addTarget(coId) {
  const repId=document.getElementById('nt-rep').value;
  if(!repId){showToast('Select a rep','error');return;}
  const t={id:uid(),companyId:coId,repId,period:document.getElementById('nt-period').value,periodValue:'2025',saleTarget:document.getElementById('nt-tgt').value||0,items:document.getElementById('nt-items').value,goals:document.getElementById('nt-goals').value,achieved:0,approvedBy:STATE.user.id};
  await apiWrite('Targets',t);STATE.targets.push(t);
  showToast('Target added ✓','success');openEditTargets(coId);
}

  const viewingMyOwn = !isM || STATE.planView==='mine';

  const ce = STATE.calEvents.filter(e=>String(e.repId||'').trim()===planRepId&&e.date===STATE.pld);
  const mp = STATE.planItems.filter(p=>String(p.repId||'').trim()===planRepId&&p.date===STATE.pld&&p.source==='manual');
  const isToday = STATE.pld === todayStr();

  // For today's visits, show status-aware cards with update prompts
  const todayVisitCards = isToday ? mp.map(p=>{
    const c=co(p.companyId);
    const st=p.status||'planned';

      (v.id===p.linkedVisitId) ||
      (v.companyId===p.companyId && v.date===p.date && String(v.repId||'').trim()===planRepId)

        <div class="row-between" style="margin-bottom:6px">

function renderAISuggestions() {
  const myId = STATE.user.id;
  const myT = STATE.targets.filter(t=>t.repId===myId);
  const plannedToday = STATE.planItems.filter(p=>p.repId===myId&&p.date===STATE.pld).map(p=>p.companyId);

  // Get regions of today's planned visits to prioritise nearby companies
  const todayRegions = plannedToday
    .map(cId=>co(cId).region||co(cId).address?.split(',').slice(-2).join(','))
    .filter(Boolean)
    .map(r=>r.toLowerCase().trim());

  // All assigned companies not yet in today's plan
  const candidates = myT
    .map(t=>STATE.companies.find(c=>c.id===t.companyId))
    .filter(Boolean)
    .filter(c=>!plannedToday.includes(c.id));

  // Score each company: higher = better suggestion
  function score(c) {
    let s = 0;
    const cRegion = (c.region||c.address||'').toLowerCase();
    // Same region as today's visits = highest priority
    if(todayRegions.some(r=>cRegion.includes(r)||r.includes(cRegion.split(',')[0]))) s+=100;
    // Priority A > B > C
    if(c.priority==='A') s+=30;
    if(c.priority==='B') s+=20;
    if(c.priority==='C') s+=10;
    // Never visited = urgent
    if(!c.lastVisited||c.lastVisited==='') s+=40;
    // Long since visited
    const d=dsi(c.lastVisited);
    if(d!==null){if(d>60)s+=30;else if(d>30)s+=20;else if(d>14)s+=10;}
    return s;
  }

  const sugs = candidates.sort((a,b)=>score(b)-score(a)).slice(0,4);

  if(!sugs.length) return `<div class="text-sm" style="text-align:center;padding:12px;color:var(--text3)">No more companies to suggest for today</div>`;

  return `<div class="text-label" style="margin-top:10px;margin-bottom:6px"><i class="ti ti-sparkles" style="font-size:11px;color:var(--purple);vertical-align:-1px"></i> AI suggestions</div>
  <div style="background:rgba(139,92,246,.06);border:1px solid rgba(139,92,246,.2);border-radius:8px;padding:8px 10px;margin-bottom:8px">
    <div class="text-xs" style="color:#C4B5FD">
      ${todayRegions.length
        ? `Showing companies near <strong>${todayRegions[0]}</strong> — sorted by priority and last visit date`
        : 'Sorted by priority and last visit date — add today\'s first visit to get location-based suggestions'}
    </div>
  </div>
  ${sugs.map(c=>{
    const d=dsi(c.lastVisited);
    const cRegion=(c.region||c.address?.split(',').slice(0,2).join(',')||'').trim();
    const sameRegion=todayRegions.some(r=>(c.region||'').toLowerCase().includes(r.split(',')[0])||r.includes((c.region||'').toLowerCase()));
    const rs=d===null?'Never visited — high priority':d>60?`${d}d without a visit — overdue`:d>30?`${d}d since last visit — good time to follow up`:'Recently visited';
    return`<div class="ai-ev">
      <i class="ti ti-sparkles" style="color:var(--purple);font-size:14px;flex-shrink:0;margin-top:1px"></i>
      <div style="flex:1">
        <div style="font-size:11px;font-weight:500">${c.name} ${pri(c.priority)}</div>
        <div class="text-xs" style="margin-bottom:2px">${cRegion}${sameRegion?' <span style="color:#C4B5FD;font-weight:500">· Same area ✓</span>':''}</div>
        <div style="font-size:10px;color:#C4B5FD">${rs}</div>
        <button class="btn btn-primary btn-sm" style="margin-top:6px;font-size:10px" onclick="addAISuggestion('${c.id}')">+ Add to plan</button>
      </div>
    </div>`;
  }).join('')}`;
}
