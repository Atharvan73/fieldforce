async function saveVisitPlan() {
  const coId = document.getElementById('av-co').value;
  const dt=document.getElementById('av-dt').value;
  if(!coId||!dt){showToast('Select a company and date','error');return;}
  const meetingWith = document.getElementById('av-wt').value||'TBD';
  const designation = document.getElementById('av-dg').value||'';
  const phone = document.getElementById('av-ph')?.value||'';
  const email = document.getElementById('av-em')?.value||'';
  const saveContact = document.getElementById('av-save-contact')?.checked;

  // Get collaborators
  const collabCheckboxes = document.querySelectorAll('input[name="av-collab"]:checked');
  const collaborators = Array.from(collabCheckboxes).map(cb=>cb.value);

  const masterId = uid();
  const item={
    id:masterId, repId:STATE.user.id, companyId:coId, date:dt,
    time:document.getElementById('av-tm').value,
    meetingWith, designation,
    itemsToPitch:document.getElementById('av-it').value,
    notes:document.getElementById('av-nt').value,
    source:'manual', status:'planned',
    collaborators: collaborators.join(','),
    isCollabMaster:'TRUE'
  };
  showToast('Saving...','');
  const ok=await apiWrite('VisitPlan',item);
  if(ok){
    STATE.planItems.push(item);

    // Create mirrored plan items for each collaborator
    for(const repId of collaborators) {
      const mirror = {
        id:uid(), repId, companyId:coId, date:dt,
        time:item.time, meetingWith, designation,
        itemsToPitch:item.itemsToPitch, notes:item.notes,
        source:'manual', status:'planned',
        collaborators: [STATE.user.id, ...collaborators.filter(c=>c!==repId)].join(','),
        isCollabMaster:'FALSE',
        collabMasterId: masterId,
        collabOwner: STATE.user.id
      };
      await apiWrite('VisitPlan', mirror);
      STATE.planItems.push(mirror);
    }

    // Save contact if name filled and checkbox checked
    if(saveContact && meetingWith && meetingWith!=='TBD') {
      const existing = STATE.contacts.find(c=>c.companyId===coId&&c.name.toLowerCase()===meetingWith.toLowerCase());
      if(!existing) await saveContactsForCompany(coId,[{name:meetingWith,designation,phone,email}]);
    }

    // Show notification dot for collaborators
    if(collaborators.length>0) addCollabNotification(coId, dt, collaborators);

    STATE.pld=dt;
    showToast(`Added to plan ✓${collaborators.length>0?' · '+collaborators.length+' collaborator(s) notified':''}`, 'success');
    closePanel('addvisit');
    renderPlan();
  }
}

function addCollabNotification(coId, dt, collaboratorIds) {
  // Store pending notifications in localStorage for each collaborator
  // When they open the app, the notif dot will be active
  const notifs = JSON.parse(localStorage.getItem('collabNotifs')||'[]');
  const c = co(coId);
  collaboratorIds.forEach(repId=>{

async function saveCollaborators(planId) {
  const p = STATE.planItems.find(x=>x.id===planId);
  if(!p) return;

  const newCollabs = Array.from(document.querySelectorAll('input[name="mc-collab"]:checked')).map(cb=>cb.value);
  const oldCollabs = (p.collaborators||'').split(',').filter(Boolean);

  // Find removed collaborators — delete their mirror items
  const removed = oldCollabs.filter(id=>!newCollabs.includes(id));
  for(const repId of removed) {
    const mirror = STATE.planItems.find(x=>x.collabMasterId===planId&&x.repId===repId);
    if(mirror){
      STATE.planItems = STATE.planItems.filter(x=>x.id!==mirror.id);
      await apiUpdate('VisitPlan',{id:mirror.id,status:'cancelled'});
    }
  }

  // Find newly added collaborators — create mirror items
  const added = newCollabs.filter(id=>!oldCollabs.includes(id));
  for(const repId of added) {
    const mirror = {
      id:uid(), repId, companyId:p.companyId, date:p.date,
      time:p.time, meetingWith:p.meetingWith, designation:p.designation||'',
      itemsToPitch:p.itemsToPitch, notes:p.notes,
      source:'manual', status:'planned',
      collaborators:[STATE.user.id, ...newCollabs.filter(c=>c!==repId)].join(','),
      isCollabMaster:'FALSE',
      collabMasterId: planId,
      collabOwner: p.repId
    };
    await apiWrite('VisitPlan', mirror);
    STATE.planItems.push(mirror);
  }

  // Update master's collaborators field
  p.collaborators = newCollabs.join(',');
  await apiUpdate('VisitPlan',{id:planId, collaborators:newCollabs.join(',')});

  // Notify newly added
  if(added.length>0) addCollabNotification(p.companyId, p.date, added);

  showToast('Collaborators updated ✓','success');
  closePanel('addvisit');
  renderPlan();
}

async function saveReschedule(planId) {
  const date = document.getElementById('rs-date').value;
  if(!date){showToast('Please select a date','error');return;}
  const plan = STATE.planItems.find(p=>p.id===planId)||{};
  const newTime = document.getElementById('rs-time').value;
  const notes = document.getElementById('rs-notes').value;

  // Cancel the old plan item
  await apiUpdate('VisitPlan',{id:planId, status:'cancelled'});
  STATE.planItems = STATE.planItems.filter(p=>p.id!==planId);

  // Create new plan item on the new date
  const newItem = {
    id:uid(), repId:plan.repId||STATE.user.id, companyId:plan.companyId,
    date, time:newTime,
    meetingWith:plan.meetingWith, designation:plan.designation||'',
    itemsToPitch:plan.itemsToPitch, notes:notes||plan.notes,
    source:'manual', status:'planned',
    collaborators:plan.collaborators||'',
    isCollabMaster:plan.isCollabMaster||'TRUE',
    rescheduledFrom:planId
  };
  await apiWrite('VisitPlan', newItem);
  STATE.planItems.push(newItem);

  // Also reschedule mirror items for collaborators
  const collabIds = (plan.collaborators||'').split(',').filter(Boolean);
  for(const repId of collabIds) {
    const mirror = STATE.planItems.find(x=>x.collabMasterId===planId&&x.repId===repId);
    if(mirror){
      await apiUpdate('VisitPlan',{id:mirror.id,status:'cancelled'});
      STATE.planItems = STATE.planItems.filter(p=>p.id!==mirror.id);
      const newMirror = {...newItem, id:uid(), repId, isCollabMaster:'FALSE', collabMasterId:newItem.id, collabOwner:plan.repId||STATE.user.id};
      await apiWrite('VisitPlan', newMirror);
      STATE.planItems.push(newMirror);
    }
  }

  showToast(`Rescheduled to ${date} ✓`,'success');
  STATE.pld = date;
  closePanel('visit');
  renderPlan();
}

      ${options.map(o=>`<div onclick="event.stopPropagation();STATE.${stateKey}='${o.val}';toggleDropdown('${stateKey}');${onChange}" style="padding:10px 14px;font-size:12px;cursor:pointer;color:${currentVal===o.val?'var(--indigo2)':'var(--text)'};background:${currentVal===o.val?'rgba(99,102,241,.1)':'transparent'}">

function toggleDropdown(id) {
  const dd = document.getElementById('dd-'+id);
  if(!dd) return;
  const isOpen = dd.style.display==='block';
  // Close all dropdowns first
  document.querySelectorAll('[id^="dd-"]').forEach(d=>d.style.display='none');
  if(!isOpen) dd.style.display='block';
}
// Close dropdowns on outside click
document.addEventListener('click', e=>{
  if(!e.target.closest('[id^="dd-"]')&&!e.target.closest('button[onclick*="toggleDropdown"]')) {
    document.querySelectorAll('[id^="dd-"]').forEach(d=>d.style.display='none');
  }
});

  // Determine whose visits to show based on logView
  const myId = String(STATE.user.id||'').trim().toLowerCase();
  let allV;
  if(!isM) {
    allV = STATE.visits.filter(v=>String(v.repId||'').trim().toLowerCase()===myId);
  } else if(STATE.logView==='mine') {
    allV = STATE.visits.filter(v=>String(v.repId||'').trim().toLowerCase()===myId);

        p.date===STATE.vd &&
        !allV.some(v=>v.companyId===p.companyId&&v.date===STATE.vd)

  const myV = allV.filter(v=>v.date===STATE.vd);

  el.innerHTML = `

// In-flight check-in guard (#3): prevents a double-tap creating two visits.
const _checkinInFlight = new Set();

async function checkIn(id) {
  if(_checkinInFlight.has(id)) return;                 // #3 re-entry guard
  const v = STATE.planItems.find(x=>x.id===id); if(!v) return;
  if(v.status==='in-progress'||v.status==='completed') return; // already checked in
  const company = co(v.companyId);
  const companyName = company?.name || 'Unknown';      // #4 undefined-company guards
  const companyAddress = company?.address || '';
  _checkinInFlight.add(id);

  // #1 — Record the visit IMMEDIATELY, before (and independent of) the photo.
  // The photo is now an optional follow-up, so a cancelled camera can never
  // leave a check-in unsaved.
  const visitId = uid();
  const ct = nowStr();
  const update = {id, status:'in-progress', checkinTime:ct, gpsVerified:'FALSE'};
  Object.assign(v, update);
  v.photoUrl = '';
  const visit = {
    id:visitId, repId:STATE.user.id, companyId:v.companyId, date:v.date, time:v.time,
    meetingWith:v.meetingWith, designation:v.designation, status:'in-progress',
    checkinTime:ct, checkoutTime:'', itemsPitched:v.itemsToPitch, remarks:'',
    rfqShared:'FALSE', sampleRequired:'FALSE', gpsVerified:'FALSE',
    nextAction:'', nextActionDate:'', photoUrl:''
  };
  STATE.visits.push(visit);
  showToast('Checked in ✓','success');
  renderPlan();

  // Persist right away — don't wait on GPS or photo.
  apiUpdate('VisitPlan', update);
  apiWrite('Visits', visit);

  // Attach location in the background and upgrade the record to GPS-verified.
  const attachLocation = (lat,lng,source,accuracy)=>{
    if(lat!=null){
      STATE.waypoints.push({lat,lng,label:'checkin',time:ct,companyId:v.companyId,companyName,source});
      saveFieldStatus(true, lat, lng);
      if(source==='gps'){
        apiWrite('GPSLive', {
          id:'live_'+STATE.user.id+'_'+v.companyId+'_'+Date.now(),
          repId:STATE.user.id, date:v.date, type:'waypoint', label:'Check-in',
          lat:Number(lat).toFixed(6), lng:Number(lng).toFixed(6),
          accuracy: accuracy!=null?Math.round(accuracy):'',
          companyName, companyId:v.companyId, time:ct, status:'on-field'
        }).catch(()=>{});
        v.gpsVerified='TRUE'; visit.gpsVerified='TRUE';
        apiUpdate('VisitPlan', {id, gpsVerified:'TRUE'});
        apiUpdate('Visits', {id:visitId, gpsVerified:'TRUE'});
        renderPlan();
      }
    } else {
      STATE.waypoints.push({lat:null,lng:null,label:'checkin',time:ct,companyId:v.companyId,companyName,address:companyAddress,source:'none'});
      saveFieldStatus(true, null, null);
    }
  };

  if(navigator.geolocation && STATE.onField){
    navigator.geolocation.getCurrentPosition(
      pos=>attachLocation(pos.coords.latitude, pos.coords.longitude, 'gps', pos.coords.accuracy),
      async ()=>{
        // GPS failed — geocode the company address via Apps Script as a fallback.
        try {
          const gr = await fetch(`${API}?action=geocode`, {method:'POST', body:JSON.stringify({name:companyName, address:companyAddress})});
          const gd = await gr.json();
          if(gd.success && gd.lat) attachLocation(gd.lat, gd.lng, 'geocode');
          else attachLocation(null, null, 'none');
        } catch(e) { attachLocation(null, null, 'none'); }
      },
      {timeout:10000, enableHighAccuracy:true, maximumAge:30000}   // #5 aligned timeout + allow a recent fix
    );
  }

  // Optional photo — attach to the (already saved) visit if the rep provides one.
  const releaseLock = ()=>_checkinInFlight.delete(id);
  const input = document.createElement('input');
  input.type='file'; input.accept='image/*'; input.capture='environment';
  input.onchange = async () => {
    releaseLock();
    if(!input.files[0]) return;
    const file = input.files[0];
    const b64 = await new Promise(res=>{ const r=new FileReader(); r.onload=()=>res(r.result.split(',')[1]); r.readAsDataURL(file); });
    v.photoUrl='uploading'; renderPlan();
    showToast('Uploading photo...','');
    uploadPhotoToDrive(b64, file.type, visitId, companyName, v.date).then(url=>{
      if(url){ visit.photoUrl=url; v.photoUrl=url; apiUpdate('Visits',{id:visitId, photoUrl:url}); showToast('Photo saved ✓','success'); }
      else { v.photoUrl=''; renderPlan(); }
    });
  };
  input.oncancel = releaseLock;            // user dismissed the picker
  setTimeout(releaseLock, 60000);          // safety net if neither event fires
  input.click();
}


async function uploadPhotoToDrive(b64, mimeType, visitId, companyName, date) {
  try {
    const r = await fetch(`${API}?action=uploadPhoto`, {
      method:'POST',
      body: JSON.stringify({
        b64, mimeType,
        filename: `checkin_${companyName}_${date}_${visitId}.jpg`,
        repName: STATE.user.name
      })
    });
    const d = await r.json();
    console.log('Drive upload response:', JSON.stringify(d).slice(0,200));
    if(!d.success) { console.error('Drive upload failed:', d.error); return ''; }
    return d.url||'';
  } catch(e) {
    console.error('Drive upload error:', e);
    return '';
  }
}

async function checkOut(id) {
  const v = STATE.planItems.find(x=>x.id===id); if(!v) return;

  // Optimistic update — re-render immediately
  const update = {id, status:'completed', checkoutTime:nowStr()};
  Object.assign(v, update);
  const visit = STATE.visits.find(x=>x.companyId===v.companyId&&x.status==='in-progress');
  if(visit){ visit.status='completed'; visit.checkoutTime=nowStr(); }
  showToast('Checked out ✓','success');
  renderPlan();

  // Save to API in background
  apiUpdate('VisitPlan', update);
  if(visit) apiUpdate('Visits', {id:visit.id, status:'completed', checkoutTime:nowStr()});
}

function scanCardForPerson(idx) {
  const input = document.createElement('input');
  input.type='file'; input.accept='image/*'; input.capture='environment';
  input.onchange = async () => {
    if(!input.files[0]) return;
    showToast('Reading card...','');
    const file = input.files[0];
    const b64 = await new Promise(res=>{ const r=new FileReader(); r.onload=()=>res(r.result.split(',')[1]); r.readAsDataURL(file); });
    try {
      const data = await callClaudeViaProxy([{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:file.type,data:b64}},
        {type:'text',text:'Extract contact details from this visiting card. Return ONLY a JSON object with keys: name, designation, phone, email. If a field is not visible, use empty string.'}
      ]}], 300);
      console.log('Claude proxy response:', JSON.stringify(data).slice(0,200));
      const text = data?.content?.[0]?.text || data?.data?.content?.[0]?.text;
      if(!text) { showToast('No response from Claude — try again','error'); return; }
      const raw = text.replace(/```json|```/g,'').trim();
      const card = JSON.parse(raw);
      if(card.name) {
        document.getElementById('pv-name-'+idx).value=card.name||'';
        document.getElementById('pv-desig-'+idx).value=card.designation||'';
        document.getElementById('pv-phone-'+idx).value=card.phone||'';
        document.getElementById('pv-email-'+idx).value=card.email||'';
        showToast('Card scanned ✓','success');
      } else {
        showToast('No contact details found — fill manually','');
      }
    } catch(e) {
      console.error('Card scan error:', e);
      showToast('Could not read card — fill manually','error');
    }
  };
  input.click();
}

async function savePostVisit(planId, visitId) {
  const plan = STATE.planItems.find(p=>p.id===planId)||{};
  const remarks = document.getElementById('pv-remarks').value.trim();
  if(!remarks){showToast('Please add what was discussed','error');return;}

  // Collect all people met
  const peopleEls = document.querySelectorAll('[id^="pv-name-"]');
  const people = [...peopleEls].map((el,i)=>({
    name: document.getElementById('pv-name-'+i)?.value.trim()||'',
    desig: document.getElementById('pv-desig-'+i)?.value.trim()||'',
    phone: document.getElementById('pv-phone-'+i)?.value.trim()||'',
    email: document.getElementById('pv-email-'+i)?.value.trim()||'',
    save: document.getElementById('pv-save-'+i)?.checked||false,
  })).filter(p=>p.name);

  const meetingWith = people.map(p=>p.name).join(', ') || document.getElementById('pv-name-0')?.value||'';
  const designation = people[0]?.desig||'';
  const items = document.getElementById('pv-items').value;
  const rfq = document.getElementById('pv-rfq').checked?'TRUE':'FALSE';
  const smp = document.getElementById('pv-smp').checked?'TRUE':'FALSE';
  const na = document.getElementById('pv-na').value;
  const nd = document.getElementById('pv-nd').value;

  showToast('Saving...','');

  if(visitId && STATE.visits.find(v=>v.id===visitId)) {
    const update = {id:visitId,meetingWith,designation,itemsPitched:items,remarks,rfqShared:rfq,sampleRequired:smp,nextAction:na,nextActionDate:nd,status:'completed'};
    await apiUpdate('Visits',update);
    const v=STATE.visits.find(x=>x.id===visitId);if(v)Object.assign(v,update);
  } else {
    const visit = {id:uid(),repId:STATE.user.id,companyId:plan.companyId,date:plan.date,time:plan.time,meetingWith,designation,status:'completed',checkinTime:plan.checkinTime||'',checkoutTime:nowStr(),itemsPitched:items,remarks,rfqShared:rfq,sampleRequired:smp,gpsVerified:plan.gpsVerified||'FALSE',nextAction:na,nextActionDate:nd,photoUrl:''};
    await apiWrite('Visits',visit);
    STATE.visits.push(visit);
  }

  // Save new contacts for each person
  for(const person of people) {
    if(!person.save || !person.name || person.name==='TBD') continue;
    const existingContact = STATE.contacts.find(c=>c.companyId===plan.companyId&&c.name.toLowerCase()===person.name.toLowerCase());
    if(!existingContact) {
      await saveContactsForCompany(plan.companyId,[{name:person.name,designation:person.desig,phone:person.phone,email:person.email}]);
    } else if(person.phone&&!existingContact.phone) {
      await apiUpdate('Contacts',{id:existingContact.id,phone:person.phone,email:person.email});
      existingContact.phone=person.phone; existingContact.email=person.email;
    }
  }

  await apiUpdate('VisitPlan',{id:planId,status:'completed'});
  const p=STATE.planItems.find(x=>x.id===planId);if(p)p.status='completed';
  await apiUpdate('Companies',{id:plan.companyId,lastVisited:plan.date});
  const c=STATE.companies.find(x=>x.id===plan.companyId);if(c)c.lastVisited=plan.date;

  if(nd&&na){
    const ce={id:uid(),repId:STATE.user.id,companyId:plan.companyId,title:na,date:nd,time:'10:00',type:'followup',confirmed:'TRUE',linkedVisitId:planId};
    await apiWrite('CalendarEvents',ce);
    STATE.calEvents.push(ce);
    showToast('Visit saved + follow-up added to calendar ✓','success');
  } else {
    showToast('Visit update saved ✓','success');
  }

  closePanel('visit');
  renderPlan();
}

// Fuzzy company match by name (handles Pvt/Ltd noise) for AI-extracted PO buyer.
function findCompanyIdByName(name) {
  const norm = s => String(s||'').toLowerCase()
    .replace(/\b(pvt|private|ltd|limited|llp|inc|corporation|company|co|the|and)\b/g,'')
    .replace(/[^a-z0-9]/g,'');
  const n = norm(name);
  if(!n) return '';
  let exact='', partial='';
  STATE.companies.forEach(c=>{
    const cn = norm(c.name);
    if(!cn) return;
    if(cn===n) exact = exact||c.id;
    else if(cn.includes(n) || n.includes(cn)) partial = partial||c.id;
  });
  return exact || partial || '';
}

async function extractPOFromFile(input) {
  const file = input.files[0];
  if(!file) return;
  const reading = document.getElementById('upl-reading');
  const chip = document.getElementById('upl-filechip');
  const isPdf = file.type==='application/pdf' || /\.pdf$/i.test(file.name);
  try {
    const b64 = await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result.split(',')[1]); r.onerror=()=>rej(new Error('read failed')); r.readAsDataURL(file); });
    _poFile = { b64, mime: file.type || (isPdf?'application/pdf':'image/jpeg'), name: file.name };
    if(chip){ chip.style.display='block'; chip.innerHTML = `<i class="ti ti-paperclip" style="font-size:11px"></i> ${file.name} attached`; }
    if(reading) reading.style.display='flex';

    const block = isPdf
      ? { type:'document', source:{ type:'base64', media_type:'application/pdf', data:b64 } }
      : { type:'image', source:{ type:'base64', media_type:_poFile.mime, data:b64 } };
    const prompt = 'This is a Purchase Order issued to us (Shakti Machinery, a B2B industrial supplier) by a customer. Extract the order details.\n\n'
      + 'Return ONLY a JSON object, no markdown, with these keys:\n'
      + '{"companyName":"the BUYER/customer company that placed this order (NOT Shakti Machinery / not the supplier)",'
      + '"poNumber":"the PO or order number",'
      + '"poDate":"order date as YYYY-MM-DD",'
      + '"items":"short comma-separated list of line items, include quantity where shown",'
      + '"totalValue": <grand total of the PO as a number, include taxes if a final total is shown, digits only - no currency symbol or commas>}\n\n'
      + 'If a field is not present, use "" (or 0 for totalValue).';

    const data = await callClaudeViaProxy([{ role:'user', content:[ block, { type:'text', text: prompt } ] }], 1024);
    const text = (data && data.content && data.content[0] && data.content[0].text)
      || (data && data.data && data.data.content && data.data.content[0] && data.data.content[0].text) || '';
    const clean = text.replace(/```json|```/g,'').trim();
    const po = JSON.parse(clean);

    if(po.poNumber) document.getElementById('upl-pono').value = po.poNumber;
    if(po.poDate && /^\d{4}-\d{2}-\d{2}$/.test(po.poDate)) document.getElementById('upl-date').value = po.poDate;
    if(po.items) document.getElementById('upl-items').value = po.items;
    if(po.totalValue) document.getElementById('upl-am').value = Math.round(Number(String(po.totalValue).replace(/[^0-9.]/g,''))||0);

    const hint = document.getElementById('upl-co-hint');
    const matchId = findCompanyIdByName(po.companyName);
    if(matchId){
      document.getElementById('upl-co').value = matchId;
      if(hint) hint.style.display='none';
    } else if(po.companyName){
      if(hint){ hint.style.display='block'; hint.innerHTML = `Read as "${po.companyName}" — not in your list. Pick the matching company above, or add it later.`; }
    }
    showToast('PO read - check the details','success');
  } catch(e) {
    console.error('PO extract error:', e);
    showToast('Could not read the PO - fill the details manually','error');
  } finally {
    if(reading) reading.style.display='none';
  }
}

async function submitPO() {
  const coId = document.getElementById('upl-co').value;
  const am = document.getElementById('upl-am').value;
  const poNumber = (document.getElementById('upl-pono') && document.getElementById('upl-pono').value.trim()) || '';
  const items = (document.getElementById('upl-items') && document.getElementById('upl-items').value.trim()) || '';
  const date = (document.getElementById('upl-date') && document.getElementById('upl-date').value) || todayStr();
  const type = document.getElementById('utp-po').classList.contains('btn-primary') ? 'PO' : 'Invoice';
  if(!coId || !am){ showToast('Please select a company and enter the total value','error'); return; }
  // Manager can credit the PO to a chosen rep; reps always credit themselves.
  const repId = (document.getElementById('upl-rep') && document.getElementById('upl-rep').value) || STATE.user.id;

  // Best-effort: store the uploaded file in Drive so it's attached to the record.
  let fileUrl = '';
  if(_poFile){
    try {
      fileUrl = await uploadPhotoToDrive(_poFile.b64, _poFile.mime, type+'_'+(poNumber||uid()), (co(coId).name||'PO'), date) || '';
    } catch(e){ console.error('PO file upload failed:', e); }
  }

  const desc = poNumber ? (type+' '+poNumber+(items?' — '+items.slice(0,60):'')) : (items.slice(0,80) || (type+' upload'));
  const po = {
    id: uid(), repId: repId, companyId: coId, type,
    amount: Math.round(Number(String(am).replace(/[^0-9.]/g,''))||0),
    description: desc, date, status: 'pending', verifiedBy: '',
    fileUrl, rfqId: '', poNumber, items
  };
  const ok = await apiWrite('POs', po);
  if(ok){
    STATE.pos.push(po);
    _poFile = null;
    showToast(type+' submitted for verification ✓','success');
    closePanel('upl');

// Selected week for the GPS/TA views (Monday ISO date; empty = current week).
function gpsViewWeek() { return weekRange(STATE.gpsWeekStart || todayStr()); }
function changeGpsWeek(delta, which) {
  const cur = gpsViewWeek();
  const d = new Date(cur.start); d.setDate(d.getDate() + delta*7);
  const curMon = weekRange(todayStr()).start;
  let ns = d.toISOString().slice(0,10);
  if(ns > curMon) ns = curMon;            // never navigate into the future
  STATE.gpsWeekStart = ns;
  (which==='teamgps' ? renderTeamGPS : renderGPS)();
}
function gpsWeekNavHtml(which) {
  const wk = gpsViewWeek();
  const curMon = weekRange(todayStr()).start;
  const isCurrent = wk.start === curMon;
  const diff = Math.round((new Date(curMon) - new Date(wk.start)) / (7*86400000));
  const label = isCurrent ? 'This week' : diff===1 ? 'Last week' : `${diff} weeks ago`;
  return `
    <div class="row-between" style="margin-bottom:12px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:6px 8px">
      <button class="btn btn-sm" onclick="changeGpsWeek(-1,'${which}')" title="Previous week"><i class="ti ti-chevron-left"></i></button>
      <div style="text-align:center;line-height:1.3">
        <div style="font-size:12px;font-weight:600">${fmtDate(wk.start)} → ${fmtDate(wk.end)}</div>
        <div style="font-size:10px;color:var(--text3)">${label}</div>
      </div>
      <button class="btn btn-sm" onclick="changeGpsWeek(1,'${which}')" ${isCurrent?'disabled style="opacity:.35;cursor:default"':''} title="Next week"><i class="ti ti-chevron-right"></i></button>
    </div>`;
}

function gpsWeekData(rId) {
  const wk=gpsViewWeek();
  const rawLogs=STATE.gpsLogs.filter(g=>g.repId===rId&&g.date>=wk.start&&g.date<=wk.end);
  // Defensive de-dupe: one log per day. Older builds could append a duplicate row;
  // keep whichever entry has the most detailed route so a day is never counted twice.
  const byDate={};
  rawLogs.forEach(g=>{
    let wpLen=0; try{ wpLen=JSON.parse(g.waypoints||'[]').length; }catch(e){}
    const cur=byDate[g.date];
    if(!cur || wpLen>cur._wpLen){ byDate[g.date]={...g,_wpLen:wpLen}; }
  });
  const logs=Object.values(byDate).sort((a,b)=>String(a.date).localeCompare(String(b.date)));
  return {wk, logs,
    weekKm: logs.reduce((s,g)=>s+Number(g.totalKm||0),0),
    weekTA: logs.reduce((s,g)=>s+Number(g.taAmount||0),0)};
}

function saveFieldStatus(onField, lat, lng) {
  const payload = {
    id: STATE.user.id,
    repId: STATE.user.id,
    repName: STATE.user.name,
    onField: onField ? 'TRUE' : 'FALSE',
    vehicle: STATE.fieldVehicle||'',
    lat: lat||'', lng: lng||'',
    time: nowStr(), date: todayStr(),
    waypoints: onField ? JSON.stringify(STATE.waypoints||[]) : ''
  };
  // Try update first (overwrites existing row), fall back to write
  fetch(`${API}?action=update&sheet=FieldStatus`, {method:'POST', body:JSON.stringify(payload)})
    .then(r=>r.json())
    .then(d=>{ if(!d.success) apiWrite('FieldStatus', payload); })
    .catch(()=>{ apiWrite('FieldStatus', payload); });
}
async function stopField() {
  if(STATE.stoppingField) return;            // guard: ignore repeat taps while a save is in flight
  if(!confirm('Mark yourself off field? This will save today\'s KM log.')) return;
  STATE.stoppingField=true;
  stopGPS();
  STATE.onField=false;
  renderGPS();                               // flip the banner now so the button can't be tapped again
  showToast('Getting final location...','');

  const saveLog = async(finalLat, finalLng) => {
   try {
    // Snapshot shared state into locals, then clear it immediately. This way a
    // stray re-trigger has nothing left to reuse or corrupt mid-flight.
    const wps = [...(STATE.waypoints||[])];
    const gpsKm = STATE.currentDayKm;
    const veh0 = STATE.fieldVehicle;
    STATE.waypoints=[]; STATE.gpsTrail=[]; STATE.currentDayKm=0; STATE.fieldVehicle=null;

    if(finalLat) {
      wps.push({
        lat: finalLat, lng: finalLng,
        label: 'End', time: nowStr(),
        companyId: null, companyName: 'End (Home/Office)'
      });
    }

    // Write off-field status with end location to sheet
    saveFieldStatus(false, finalLat, finalLng);

    let totalKm = gpsKm;
    let routeLegs = [];

    if(wps.length >= 2) {
      showToast('Calculating road distance via Google Maps...','');
      try {
        const r = await fetch(`${API}?action=calcRoute`, {
          method:'POST',
          body: JSON.stringify({waypoints: wps})
        });
        const d = await r.json();
        if(d.success && d.totalKm>0) {
          totalKm = d.totalKm;
          routeLegs = d.legs||[];
        }
      } catch(e) {
        console.error('Route calc failed, using GPS fallback:', e);
      }
    }

    // Allow manual override if no waypoints or GPS failed
    if(totalKm===0||wps.length<2) {
      const manual = prompt(`Enter today's total distance (km):\n(GPS tracking gave: ${gpsKm.toFixed(1)} km)`);
      if(manual && !isNaN(parseFloat(manual))) totalKm = parseFloat(manual);
    }

    // Upsert: if a log already exists for this rep today, update it in place
    // instead of appending a second row (prevents the day being double-counted).
    const existing = STATE.gpsLogs.find(g=>g.repId===STATE.user.id && g.date===todayStr());
    const veh = veh0 || existing?.vehicle || 'two-wheeler';
    const log = {
      id: existing?.id || uid(), repId:STATE.user.id, date:todayStr(),
      dayOfWeek:new Date().toLocaleDateString('en-IN',{weekday:'short'}),
      totalKm:Number(totalKm).toFixed(2), vehicle:veh,
      kmRate:kmRate(veh),
      taAmount:taAmt(Number(totalKm), veh),
      onFieldStart: wps[0]?.time||'',
      onFieldEnd: nowStr(),
      waypoints: JSON.stringify(wps),
      routeLegs: JSON.stringify(routeLegs)
    };
    if(existing) {
      await apiUpdate('GPSLogs', log);
      Object.assign(existing, log);
    } else {
      await apiWrite('GPSLogs', log);
      STATE.gpsLogs.push(log);
    }
    showToast(`Off field ✓ · ${Number(totalKm).toFixed(1)} km · ${fmtINR(log.taAmount)} TA earned`,'success');
    renderGPS();
   } finally {
    STATE.stoppingField=false;               // always release the lock, even on error
   }
  };

  if(navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => saveLog(pos.coords.latitude, pos.coords.longitude),
      () => {
        showToast('Location unavailable — saving without end coordinates','');
        saveLog(null, null);
      },
      {enableHighAccuracy:true, timeout:15000, maximumAge:0}
    );
  } else {
    saveLog(null, null);
  }
}

  STATE.gpsWatcher=navigator.geolocation.watchPosition(pos=>{
    if(lastPos){STATE.currentDayKm+=haversineKm(lastPos.latitude,lastPos.longitude,pos.coords.latitude,pos.coords.longitude);}
    lastPos=pos.coords;
    STATE.gpsTrail.push({lat:pos.coords.latitude,lng:pos.coords.longitude,t:nowStr()});
  },{enableHighAccuracy:true,maximumAge:30000,timeout:10000});
}

async function resolveApproval(id, status) {
  await apiUpdate('Approvals',{id,status,resolvedBy:STATE.user.id,resolvedDate:todayStr()});
  const a=STATE.approvals.find(x=>x.id===id);
  if(a){a.status=status;a.resolvedBy=STATE.user.id;}

  if(status==='approved' && a?.type==='remove_contact' && a?.poId) {
    STATE.contacts = STATE.contacts.filter(x=>x.id!==a.poId);
    await apiDelete('Contacts', a.poId);
    showToast('Contact removed ✓','success');
  } else if(status==='approved' && a?.type==='remove_company' && a?.companyId) {
    // Check if this company is assigned to other reps too
    const otherRepsWithCompany = STATE.targets.filter(t=>
      t.companyId===a.companyId &&
      t.repId!==a.repId
    );

    if(otherRepsWithCompany.length > 0) {
      // Other reps still have this company — only remove for requesting rep
      const repTargets = STATE.targets.filter(t=>t.companyId===a.companyId&&t.repId===a.repId);
      for(const t of repTargets) {
        await apiUpdate('Targets',{id:t.id,active:'FALSE'});
      }
      STATE.targets = STATE.targets.filter(t=>!(t.companyId===a.companyId&&t.repId===a.repId));
      showToast('Approved — removed from rep\'s list ✓','success');
    } else {
      // No other reps have this company — remove entirely
      await apiUpdate('Companies',{id:a.companyId,active:'FALSE'});
      STATE.companies = STATE.companies.filter(c=>c.id!==a.companyId);
      STATE.targets = STATE.targets.filter(t=>t.companyId!==a.companyId);
      showToast('Approved — company removed ✓','success');
    }
  } else {
    showToast(status==='approved'?'Approved ✓':'Rejected','success');
  }

  renderTeam();
  renderHome();
  // If on companies page, refresh it too
  if(STATE.page==='companies') renderCompanies();
}

async function processCard(input) {
  const file=input.files[0];if(!file)return;
  document.getElementById('card-loading').style.display='flex';
  try {
    const b64=await fileToBase64(file);
    const data = await callClaudeViaProxy([{role:'user',content:[
      {type:'image',source:{type:'base64',media_type:file.type,data:b64}},
      {type:'text',text:'Extract contact details from this visiting card. Return ONLY a JSON object with keys: name, designation, company, phone, email. If a field is not visible, use empty string.'}
    ]}], 500);
    const text=data.content?.[0]?.text||'{}';
    const clean=text.replace(/```json|```/g,'').trim();
    const info=JSON.parse(clean);
    document.getElementById('cr-name').value=info.name||'';
    document.getElementById('cr-desig').value=info.designation||'';
    document.getElementById('cr-company').value=info.company||'';
    document.getElementById('cr-phone').value=info.phone||'';
    document.getElementById('cr-email').value=info.email||'';
  } catch(e){ showToast('AI reading failed — fill manually','error'); }
  document.getElementById('card-loading').style.display='none';
  document.getElementById('card-result').style.display='block';
}
function fileToBase64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=()=>rej(new Error('Read failed'));r.readAsDataURL(file);});}

// ── RFQ TRACKER ───────────────────────────────────────────────────────────────

const RFQ_STATUSES = ['New Lead','Quoted','Order Received','Order Lost','Unmatched PO'];

function rfqStatusBadge(status) {
  const map = {
    'New Lead':      ['badge-red','Not Quoted'],
    'Quoted':        ['badge-amber','Quoted'],
    'Order Received':['badge-green','Order Received'],
    'Order Lost':    ['badge-gray','Lost'],
    'Unmatched PO':  ['badge-purple','Unmatched PO'],
  };
  const [cls,lbl] = map[status]||['badge-gray',status];
  return `<span class="badge ${cls}">${lbl}</span>`;
}

function rfqDaysAgo(dateStr) {
  if(!dateStr) return null;
  let d;
  // Handle dd-mm-yyyy, yyyy-mm-dd, and dd/mm/yyyy
  if(/^\d{2}-\d{2}-\d{4}$/.test(dateStr)) {
    const [dd,mm,yyyy] = dateStr.split('-');
    d = new Date(`${yyyy}-${mm}-${dd}`);
  } else {
    d = new Date(dateStr);
  }
  if(isNaN(d)) return null;
  return Math.floor((Date.now()-d)/86400000);
}

function rfqUrgency(rfq) {
  const days = rfqDaysAgo(rfq.rfqDate||rfq.rfqdate);
  if((rfq.status==='New Lead')&&days>3) return 'high';
  if((rfq.status==='Quoted')&&days>7) return 'medium';
  return 'low';
}

function getRFQContactAttribution(rfq) {
  const email = String(rfq.customerEmail||rfq.customeremail||'').toLowerCase().trim();
  if(!email) return {label:'Not in contacts', cls:'badge-gray'};
  const contact = STATE.contacts.find(c=>c.email&&c.email.toLowerCase().trim()===email);
  if(!contact) return {label:'Not in contacts', cls:'badge-gray'};
  const targets = STATE.targets.filter(t=>t.companyId===contact.companyId);
  if(!targets.length) return {label:'Known contact', cls:'badge-blue'};
  const repIds = [...new Set(targets.map(t=>t.repId))];
  const names = repIds.map(id=>{
    const u = STATE.users.find(u=>u.id===id);
    if(!u) return null;
    if(u.id===STATE.user.id) return 'My contact';
    return u.name.split(' ')[0]+"'s contact";
  }).filter(Boolean);
  if(!names.length) return {label:'Known contact', cls:'badge-blue'};
  const isMyContact = names.some(n=>n==='My contact');
  return {label:names.join(' · '), cls:isMyContact?'badge-green':'badge-blue'};
}

function rfqOwnerTag(rfq) {
  const attr = getRFQContactAttribution(rfq);
  return `<span class="badge ${attr.cls}" style="font-size:8px">${attr.label}</span>`;
}

function getMyRFQs() {
  const isM = STATE.user.role==='manager';
  if(!STATE.rfqViewUser) STATE.rfqViewUser='all';

  if(isM) {
    if(STATE.rfqViewUser==='all') return STATE.rfqs;
    if(STATE.rfqViewUser==='unassigned') return STATE.rfqs.filter(r=>!r.repId&&getRFQContactAttribution(r).label==='Not in contacts');
    // Filter by whose contacts the RFQ belongs to
    return STATE.rfqs.filter(r=>{
      if(r.repId===STATE.rfqViewUser) return true;
      const email = String(r.customerEmail||r.customeremail||'').toLowerCase();
      const contact = STATE.contacts.find(c=>c.email&&c.email.toLowerCase()===email);
      if(!contact) return false;
      return STATE.targets.some(t=>t.companyId===contact.companyId&&t.repId===STATE.rfqViewUser);
    });
  }

  // Reps see only their own or RFQs linked to their contacts
  const myId = STATE.user.id;
  return STATE.rfqs.filter(r=>{
    if(r.repId===myId) return true;
    const email = String(r.customerEmail||r.customeremail||'').toLowerCase();
    const contact = STATE.contacts.find(c=>c.email&&c.email.toLowerCase()===email);
    if(contact) return STATE.targets.some(t=>t.companyId===contact.companyId&&t.repId===myId);
    return false;
  });
}

        if(r.repId===u.id) return true;
        const email = String(r.customerEmail||r.customeremail||'').toLowerCase();
        const contact = STATE.contacts.find(c=>c.email&&c.email.toLowerCase()===email);
        return contact && STATE.targets.some(t=>t.companyId===contact.companyId&&t.repId===u.id);
      }).length;
      const label = u.id===STATE.user.id ? `My contacts (${count})` : `${u.name.split(' ')[0]}'s contacts (${count})`;
      return {val:u.id, label};
    }),
    {val:'unassigned', label:'Not in contacts'},
  ];
  const current = options.find(o=>o.val===STATE.rfqViewUser)||options[0];
  return `<div style="position:relative;display:inline-block">
    <button onclick="event.stopPropagation();toggleDropdown('rfqVU')" style="display:flex;align-items:center;gap:5px;padding:5px 10px;background:var(--indigo);color:#fff;border:none;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;max-width:160px">
      <i class="ti ti-selector" style="font-size:11px;flex-shrink:0"></i>
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${current.label}</span>
    </button>
    <div id="dd-rfqVU" style="display:none;position:absolute;top:34px;right:0;background:var(--bg2);border:1px solid var(--border);border-radius:10px;min-width:200px;z-index:200;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.5)">
      ${options.map(o=>`<div onclick="event.stopPropagation();STATE.rfqViewUser='${o.val}';toggleDropdown('rfqVU');renderRFQ()" style="padding:10px 14px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:8px;color:${STATE.rfqViewUser===o.val?'var(--indigo2)':'var(--text)'};background:${STATE.rfqViewUser===o.val?'rgba(99,102,241,.1)':'transparent'}">
        ${STATE.rfqViewUser===o.val?'<i class="ti ti-check" style="font-size:11px;color:var(--indigo2)"></i>':'<span style="width:15px;display:inline-block"></span>'}${o.label}
      </div>`).join('')}
    </div>
  </div>`;
}

// ── MONTHLY ANALYSIS ──────────────────────────────────────────────────────────
function anMonthBounds() {
  const {y,m} = STATE.anMonth;
  const mm = String(m+1).padStart(2,'0');
  const last = String(new Date(y,m+1,0).getDate()).padStart(2,'0');
  return { start:`${y}-${mm}-01`, end:`${y}-${mm}-${last}` };
}
function changeAnMonth(delta) {
  let {y,m} = STATE.anMonth; m += delta;
  if(m<0){m=11;y--;} if(m>11){m=0;y++;}
  const now = new Date();
  if(y>now.getFullYear() || (y===now.getFullYear() && m>now.getMonth())) return; // never go future
  STATE.anMonth = {y,m};
  renderAnalysis();
}

function renderAnalysis() {
  const el = document.getElementById('page-analysis');
  if(!el) return;
  const isM = STATE.user.role==='manager';
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const monLabel = `${months[STATE.anMonth.m]} ${STATE.anMonth.y}`;
  const isCurrentMonth = STATE.anMonth.y===new Date().getFullYear() && STATE.anMonth.m===new Date().getMonth();
  const {start,end} = anMonthBounds();

  // Scope — reps see only themselves; manager can pick All team or a rep.
  if(!isM) STATE.anRep = STATE.user.id;
  const inScope = (row)=> STATE.anRep==='all' ? true : String(row.repId||'').trim()===STATE.anRep;

  // Visits logged this month (Visits sheet holds real visits; cancelled/not-visited live in plans).
  const visits = STATE.visits.filter(v=> v.date>=start && v.date<=end && v.status!=='cancelled' && inScope(v));
  // Orders received this month — any PO that isn't rejected (pending or verified both count as "received").
  const orders = STATE.pos.filter(p=> String(p.date||'')>=start && String(p.date||'')<=end && p.status!=='rejected' && inScope(p));

  // Aggregate per company.
  const byCo = {};
  const bump = id => (byCo[id] = byCo[id] || {visits:0, orders:0, value:0});
  visits.forEach(v=>{ if(v.companyId) bump(v.companyId).visits++; });
  orders.forEach(p=>{ if(p.companyId){ const c=bump(p.companyId); c.orders++; c.value+=Number(p.amount||0); } });

  const rows = Object.keys(byCo).map(id=>({id, name: co(id).name||'Unknown', ...byCo[id]}));
  const visitedRows  = rows.filter(r=>r.visits>0).sort((a,b)=> b.visits-a.visits || b.value-a.value);
  const orderOnlyRows= rows.filter(r=>r.visits===0 && r.orders>0).sort((a,b)=> b.value-a.value);

  const totalCompaniesVisited = visitedRows.length;
  const totalVisits = visits.length;
  const totalOrders = orders.length;
  const totalValue  = orders.reduce((s,p)=>s+Number(p.amount||0),0);

  el.innerHTML = `
    <div style="font-size:16px;font-weight:600;margin-bottom:12px">Monthly Analysis</div>

    <div class="row-between" style="margin-bottom:12px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:6px 8px">
      <button class="btn btn-sm" onclick="changeAnMonth(-1)" title="Previous month"><i class="ti ti-chevron-left"></i></button>
      <div style="text-align:center;line-height:1.3">
        <div style="font-size:13px;font-weight:600">${monLabel}</div>
        <div style="font-size:10px;color:var(--text3)">${isCurrentMonth?'This month':''}</div>
      </div>
      <button class="btn btn-sm" onclick="changeAnMonth(1)" ${isCurrentMonth?'disabled style="opacity:.35"':''} title="Next month"><i class="ti ti-chevron-right"></i></button>
    </div>

    ${isM?`<div class="chip-row">
      <span class="chip${STATE.anRep==='all'?' active':''}" onclick="STATE.anRep='all';renderAnalysis()">All team</span>
      ${myReps().map(r=>`<span class="chip${STATE.anRep===r.id?' active':''}" onclick="STATE.anRep='${r.id}';renderAnalysis()">${r.name.split(' ')[0]}</span>`).join('')}
    </div>`:''}

    <div class="grid2 desk-grid2" style="margin-bottom:12px">
      <div class="card" style="padding:12px;text-align:center"><div style="font-size:20px;font-weight:700;color:var(--indigo2)">${totalCompaniesVisited}</div><div class="text-xs">Companies visited</div></div>
      <div class="card" style="padding:12px;text-align:center"><div style="font-size:20px;font-weight:700">${totalVisits}</div><div class="text-xs">Total visits</div></div>
      <div class="card" style="padding:12px;text-align:center"><div style="font-size:20px;font-weight:700;color:var(--emerald)">${totalOrders}</div><div class="text-xs">Orders received</div></div>
      <div class="card" style="padding:12px;text-align:center"><div style="font-size:18px;font-weight:700;color:var(--emerald)">${fmt(totalValue)}</div><div class="text-xs">Order value</div></div>
    </div>

    <div class="text-label" style="margin-bottom:8px">Companies visited — ${monLabel}</div>
    ${visitedRows.length ? `
    <div class="co-list">
      <div style="display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border);font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px">
        <div style="flex:1">Company</div>
        <div style="width:46px;text-align:center">Visits</div>
        <div style="width:46px;text-align:center">Orders</div>
        <div style="width:76px;text-align:right">Value</div>
      </div>
      ${visitedRows.map(r=>`
      <div class="co-row"><div style="display:flex;align-items:center;padding:10px 12px;gap:6px">
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.name}</div>
          ${isM&&STATE.anRep==='all'?`<div style="font-size:9px;color:var(--text3)">${[...new Set(STATE.visits.filter(v=>v.companyId===r.id&&v.date>=start&&v.date<=end&&v.status!=='cancelled').map(v=>rep(v.repId)?.name?.split(' ')[0]).filter(Boolean))].join(', ')}</div>`:''}
        </div>
        <div style="width:46px;text-align:center"><span class="badge badge-blue">${r.visits}</span></div>
        <div style="width:46px;text-align:center">${r.orders>0?`<span class="badge badge-green">${r.orders}</span>`:'<span class="text-xs" style="color:var(--text3)">—</span>'}</div>
        <div style="width:76px;text-align:right;font-size:11px;font-weight:600;color:${r.value>0?'var(--emerald)':'var(--text3)'}">${r.value>0?fmt(r.value):'—'}</div>
      </div></div>`).join('')}
    </div>` : `<div class="empty"><i class="ti ti-clipboard-off"></i><p>No visits logged in ${monLabel}</p><small>Visits your ${isM?'team logs':'team logs'} this month will appear here</small></div>`}

    ${orderOnlyRows.length?`
    <div class="text-label" style="margin-top:14px;margin-bottom:8px">Orders from companies not visited this month</div>
    <div class="co-list">
      ${orderOnlyRows.map(r=>`
      <div class="co-row"><div style="display:flex;align-items:center;padding:10px 12px;gap:6px">
        <div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:500">${r.name}</div></div>
        <div style="width:46px;text-align:center"><span class="badge badge-green">${r.orders}</span></div>
        <div style="width:76px;text-align:right;font-size:11px;font-weight:600;color:var(--emerald)">${fmt(r.value)}</div>
      </div></div>`).join('')}
    </div>`:''}`;
}

function renderRFQ() {
  const el = document.getElementById('page-rfq');
  const isM = STATE.user.role==='manager';
  if(!STATE.rfqView) STATE.rfqView = 'open';
  if(!STATE.rfqFilter) STATE.rfqFilter = 'all';
  if(!STATE.rfqSearch) STATE.rfqSearch = '';
  if(!STATE.rfqCatFilter) STATE.rfqCatFilter = 'all';
  if(!STATE.rfqRepFilter) STATE.rfqRepFilter = 'all';
  if(!STATE.rfqCoFilter) STATE.rfqCoFilter = '';
  if(!STATE.rfqCustFilter) STATE.rfqCustFilter = '';

  const myRfqs = getMyRFQs();
  const openRFQs = myRfqs.filter(r=>r.status==='New Lead'||r.status==='Quoted');
  const closedRFQs = myRfqs.filter(r=>r.status==='Order Received'||r.status==='Order Lost');

  const notQuoted = openRFQs.filter(r=>r.status==='New Lead').length;
  const quoted = openRFQs.filter(r=>r.status==='Quoted').length;
  const ordered = closedRFQs.filter(r=>r.status==='Order Received').length;
  const lost = closedRFQs.filter(r=>r.status==='Order Lost').length;

  // Get linked company for each RFQ via contacts
  function rfqCompany(rfq) {
    if(rfq.companyId) return co(rfq.companyId);
    const contact = STATE.contacts.find(c=>c.email&&c.email.toLowerCase()===String(rfq.customerEmail||'').toLowerCase());
    if(contact) return co(contact.companyId);
    return null;
  }

  // Filter pipeline: view → status → category → rep → search
  let displayRFQs = STATE.rfqView==='open' ? openRFQs : STATE.rfqView==='closed' ? closedRFQs : myRfqs;
  if(STATE.rfqFilter!=='all') displayRFQs = displayRFQs.filter(r=>r.status===STATE.rfqFilter);
  if(STATE.rfqCatFilter!=='all') displayRFQs = displayRFQs.filter(r=>(r.category||'')===STATE.rfqCatFilter);
  if(isM && STATE.rfqRepFilter!=='all') displayRFQs = displayRFQs.filter(r=>r.repId===STATE.rfqRepFilter);
  if(STATE.rfqCoFilter.trim()) {
    const qc = STATE.rfqCoFilter.trim().toLowerCase();
    displayRFQs = displayRFQs.filter(r=>{
      if((r.contactCompanyName||'').toLowerCase().includes(qc)) return true;
      if(r.companyId){ const c=co(r.companyId); if((c?.name||'').toLowerCase().includes(qc)) return true; }
      const email=String(r.customerEmail||'').toLowerCase().trim();
      if(email){ const contact=STATE.contacts.find(c=>c.email&&c.email.toLowerCase().trim()===email); if(contact){ const c=co(contact.companyId); if((c?.name||'').toLowerCase().includes(qc)) return true; } }
      return false;
    });
  }
  if(STATE.rfqCustFilter.trim()) {
    const qu = STATE.rfqCustFilter.trim().toLowerCase();
    displayRFQs = displayRFQs.filter(r=>
      (r.contactPersonName||'').toLowerCase().includes(qu)||
      (r.customerName||'').toLowerCase().includes(qu)
    );
  }
  if(STATE.rfqSearch.trim()) {
    const q = STATE.rfqSearch.trim().toLowerCase();
    displayRFQs = displayRFQs.filter(r=>{
      const cmp = rfqCompany(r);
      return (r.rfqSubject||r.subject||'').toLowerCase().includes(q)
        || (r.customerName||'').toLowerCase().includes(q)
        || (cmp?.name||'').toLowerCase().includes(q)
        || (r.customerEmail||'').toLowerCase().includes(q);
    });
  }

  // Sort: high urgency first, then by date
  displayRFQs = [...displayRFQs].sort((a,b)=>{
    const urgMap={'high':0,'medium':1,'low':2};
    const ua=urgMap[rfqUrgency(a)]||2, ub=urgMap[rfqUrgency(b)]||2;
    if(ua!==ub) return ua-ub;
    // Newest first within same urgency
    const da = new Date(a.rfqDate||a.rfqdate||0);
    const db = new Date(b.rfqDate||b.rfqdate||0);
    return db-da;
  });

  // Count active secondary filters for badge
  const activeFilters = (STATE.rfqCatFilter!=='all'?1:0) + (isM&&STATE.rfqRepFilter!=='all'?1:0) + (STATE.rfqCoFilter?1:0) + (STATE.rfqCustFilter?1:0);

  // Build category list from actual data
  const allCats = [...new Set(myRfqs.map(r=>r.category).filter(Boolean))].sort();

  el.innerHTML = `
    <div class="row-between" style="margin-bottom:14px">
      <div style="font-size:16px;font-weight:600">RFQ Tracker</div>
      <div class="row" style="gap:6px">
        ${rfqViewDropdown()}
        <button class="btn btn-primary btn-sm" onclick="openAddRFQPanel()"><i class="ti ti-plus"></i> Add</button>
      </div>
    </div>

    <!-- Summary bar -->
    <div class="grid2" style="gap:8px;margin-bottom:12px">
      <div class="card" style="padding:12px;border-color:rgba(239,68,68,.3);cursor:pointer" onclick="STATE.rfqView='open';STATE.rfqFilter='New Lead';renderRFQ()">
        <div style="font-size:22px;font-weight:700;color:#FCA5A5">${notQuoted}</div>
        <div class="text-xs">Not quoted</div>
        <div class="text-xs" style="color:var(--red);margin-top:2px">Needs action</div>
      </div>
      <div class="card" style="padding:12px;border-color:rgba(245,158,11,.3);cursor:pointer" onclick="STATE.rfqView='open';STATE.rfqFilter='Quoted';renderRFQ()">
        <div style="font-size:22px;font-weight:700;color:#FCD34D">${quoted}</div>
        <div class="text-xs">Quoted / Awaited</div>
        <div class="text-xs" style="color:var(--amber);margin-top:2px">Order pending</div>
      </div>
      <div class="card" style="padding:12px;border-color:rgba(16,185,129,.3);cursor:pointer" onclick="STATE.rfqView='closed';STATE.rfqFilter='Order Received';renderRFQ()">
        <div style="font-size:22px;font-weight:700;color:#34D399">${ordered}</div>
        <div class="text-xs">Orders received</div>
        <div class="text-xs" style="color:var(--emerald);margin-top:2px">Closed won</div>
      </div>
      <div class="card" style="padding:12px;cursor:pointer" onclick="STATE.rfqView='closed';STATE.rfqFilter='Order Lost';renderRFQ()">
        <div style="font-size:22px;font-weight:700;color:var(--text2)">${lost}</div>
        <div class="text-xs">Orders lost</div>
        <div class="text-xs" style="color:var(--text3);margin-top:2px">Closed lost</div>
      </div>
    </div>

    <!-- View tabs -->
    <div class="seg-tabs" style="margin-bottom:10px">
      <button class="seg-tab${STATE.rfqView==='open'?' active':''}" onclick="STATE.rfqView='open';STATE.rfqFilter='all';renderRFQ()">Open (${openRFQs.length})</button>
      <button class="seg-tab${STATE.rfqView==='closed'?' active':''}" onclick="STATE.rfqView='closed';STATE.rfqFilter='all';renderRFQ()">Closed (${closedRFQs.length})</button>
      <button class="seg-tab${STATE.rfqView==='all'?' active':''}" onclick="STATE.rfqView='all';STATE.rfqFilter='all';renderRFQ()">All (${myRfqs.length})</button>
    </div>

    <!-- Status filter chips -->
    <div class="chip-row" style="margin-bottom:10px">
      <span class="chip${STATE.rfqFilter==='all'?' active':''}" onclick="STATE.rfqFilter='all';renderRFQ()">All</span>
      <span class="chip${STATE.rfqFilter==='New Lead'?' active':''}" onclick="STATE.rfqFilter='New Lead';renderRFQ()" style="border-color:rgba(239,68,68,.3);color:#FCA5A5">Not Quoted</span>
      <span class="chip${STATE.rfqFilter==='Quoted'?' active':''}" onclick="STATE.rfqFilter='Quoted';renderRFQ()" style="border-color:rgba(245,158,11,.3);color:#FCD34D">Quoted</span>
      <span class="chip${STATE.rfqFilter==='Order Received'?' active':''}" onclick="STATE.rfqFilter='Order Received';renderRFQ()" style="border-color:rgba(16,185,129,.3);color:#34D399">Order Received</span>
      <span class="chip${STATE.rfqFilter==='Order Lost'?' active':''}" onclick="STATE.rfqFilter='Order Lost';renderRFQ()">Lost</span>
    </div>

    <!-- Search + Filter row -->
    <div class="row" style="gap:8px;margin-bottom:12px">
      <div class="search-wrap" style="flex:1;margin-bottom:0">

      <button class="btn btn-sm" onclick="openRFQFilterPanel()" style="flex-shrink:0;gap:5px;position:relative;${activeFilters>0?'border-color:var(--indigo);color:var(--indigo2);background:rgba(99,102,241,.1)':''}">

        ${activeFilters>0?`<span style="position:absolute;top:-4px;right:-4px;width:16px;height:16px;background:var(--indigo);border-radius:50%;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;color:#fff">${activeFilters}</span>`:''}

    </div>`:''}

    <!-- RFQ tiles -->
    ${displayRFQs.length===0
      ? `<div class="empty"><i class="ti ti-file-search"></i><p>No RFQs match your filters</p><small><span style="color:var(--indigo2);cursor:pointer" onclick="STATE.rfqSearch='';STATE.rfqCatFilter='all';STATE.rfqRepFilter='all';STATE.rfqCoFilter='';STATE.rfqCustFilter='';renderRFQ()">Clear filters</span></small></div>`
      : displayRFQs.map(rfq=>{
          const urg = rfqUrgency(rfq);
          const days = rfqDaysAgo(rfq.rfqDate||rfq.rfqdate);
          const cmp = rfqCompany(rfq);

async function saveRFQCompany(rfqId) {
  const rfq = STATE.rfqs.find(r=>r.id===rfqId);
  if(!rfq) return;
  const name = document.getElementById('radc-coname')?.value.trim();
  const addr = document.getElementById('radc-addr')?.value.trim();
  const repId = document.getElementById('radc-rep')?.value;
  if(!name||!addr){showToast('Company name and address are required','error');return;}
  if(!repId){showToast('Please assign a rep','error');return;}
  showToast('Saving...','');
  const cId = uid();
  const coObj = {
    id:cId, name, address:addr,
    region:'', industry:document.getElementById('radc-ind')?.value||'',
    priority:document.getElementById('radc-pri')?.value||'C',
    assignedReps:repId, lastVisited:'', totalBusiness:0,
    addedBy:STATE.user.id, active:'TRUE'
  };
  const ok = await apiWrite('Companies', coObj);
  if(!ok){showToast('Failed to save company','error');return;}
  STATE.companies.push(coObj);
  // Link RFQ to this company
  await apiUpdate('RFQs',{id:rfqId,companyId:cId});
  if(rfq) rfq.companyId = cId;
  // Optionally save contact
  if(document.getElementById('radc-save-contact')?.checked && rfq.customerName) {
    await saveContactsForCompany(cId,[{
      name: rfq.customerName, email: rfq.customerEmail||'',
      phone:'', designation:''
    }]);
  }
  showToast(`${name} added and linked to RFQ ✓`,'success');
  closePanel('rfq-add-from');
  openRFQDetail(rfqId);
}

function rfqCoName(rfq) {
  if(rfq.contactCompanyName) return rfq.contactCompanyName;
  if(rfq.companyId){ const c=co(rfq.companyId); if(c?.name) return c.name; }
  const email=String(rfq.customerEmail||'').toLowerCase().trim();
  if(email){ const contact=STATE.contacts.find(c=>c.email&&c.email.toLowerCase().trim()===email); if(contact){ const c=co(contact.companyId); if(c?.name) return c.name; } }
  return '';
}

function filterRFQList(listId, query) {
  const q = query.toLowerCase();
  document.querySelectorAll(`#${listId} .flt-co-item, #${listId} .flt-cust-item, #${listId} .flt-item`).forEach(el=>{

async function markOrderReceived(rfqId) {
  const amount = document.getElementById('rfq-po-amount')?.value;
  if(!amount){showToast('Please enter PO amount','error');return;}
  const rfq = STATE.rfqs.find(x=>x.id===rfqId);
  if(!rfq)return;
  await apiUpdate('RFQs',{id:rfqId,status:'Order Received',poDate:todayStr()});
  rfq.status='Order Received';rfq.poDate=todayStr();
  // Auto-register PO in target tracking
  const contact = STATE.contacts.find(c=>c.email&&c.email.toLowerCase()===String(rfq.customerEmail||'').toLowerCase());
  const coId = rfq.companyId||(contact?.companyId)||'';
  const repId = rfq.repId||STATE.user.id;
  if(coId&&repId) {
    const po={id:uid(),repId,companyId:coId,type:'PO',amount,description:rfq.rfqSubject||'RFQ Order',date:todayStr(),status:'pending',verifiedBy:'',fileUrl:'',rfqId};
    await apiWrite('POs',po);
    STATE.pos.push(po);
    showToast('Order received + PO registered for verification ✓','success');
  } else {
    showToast('Order marked received ✓','success');
  }
  // Complete any related tasks
  STATE.tasks.filter(t=>t.rfqId===rfqId).forEach(async t=>{
    await apiUpdate('Tasks',{id:t.id,status:'completed'});t.status='completed';
  });
  closePanel('rfq-detail');
  renderRFQ();
}

function autoCreateFollowupTask(rfqId) {
  const rfq = STATE.rfqs.find(r=>r.id===rfqId);
  if(!rfq)return;
  const existingTask = STATE.tasks.find(t=>t.rfqId===rfqId&&t.status==='pending');
  if(existingTask)return; // already has a task
  const dueDate = new Date();
  if(rfq.status==='New Lead') dueDate.setDate(dueDate.getDate()+2);
  if(rfq.status==='Quoted') dueDate.setDate(dueDate.getDate()+7);
  const task = {
    id:uid(),
    repId:rfq.repId||STATE.user.id,
    rfqId,
    companyId:rfq.companyId||'',
    type:rfq.status==='New Lead'?'quote':'followup',
    title:rfq.status==='New Lead'?`Quote RFQ: ${rfq.rfqSubject||''}`.substring(0,60):`Follow up on quotation: ${rfq.rfqSubject||''}`.substring(0,60),
    dueDate:dueDate.toISOString().slice(0,10),
    status:'pending',
    priority:rfq.status==='New Lead'?'high':'medium',
    createdDate:todayStr(),
  };
  apiWrite('Tasks',task).then(ok=>{ if(ok) STATE.tasks.push(task); });
}

function autoGenerateTasks() {
  // Generate tasks for overdue RFQs that don't have tasks yet
  const myId = STATE.user.id;
  STATE.rfqs.filter(r=>(r.repId===myId||!r.repId)&&(r.status==='New Lead'||r.status==='Quoted')).forEach(rfq=>{
    const days = rfqDaysAgo(rfq.rfqDate)||0;
    const hasTask = STATE.tasks.some(t=>t.rfqId===rfq.id&&t.status==='pending');
    if(!hasTask&&((rfq.status==='New Lead'&&days>1)||(rfq.status==='Quoted'&&days>5))) {
      autoCreateFollowupTask(rfq.id);
    }
  });
}

function renderTasks() {
  const el = document.getElementById('page-tasks');
  const isM = STATE.user.role==='manager';
  const myId = STATE.user.id;
  const myTasks = isM
    ? STATE.tasks
    : STATE.tasks.filter(t=>t.repId===myId||!t.repId);

  // Auto-generate any missing tasks
  autoGenerateTasks();

  const pending = myTasks.filter(t=>t.status==='pending');
  const completed = myTasks.filter(t=>t.status==='completed');

  // Sort: overdue first, then by due date
  const sorted = [...pending].sort((a,b)=>{
    const aOverdue = a.dueDate<todayStr();
    const bOverdue = b.dueDate<todayStr();
    if(aOverdue&&!bOverdue) return -1;
    if(!aOverdue&&bOverdue) return 1;
    return a.dueDate.localeCompare(b.dueDate);
  });

  el.innerHTML = `
    <div class="row-between" style="margin-bottom:14px">
      <div style="font-size:16px;font-weight:600">Tasks</div>
      <div class="row" style="gap:6px">
        <span class="badge badge-red" style="font-size:11px">${sorted.filter(t=>t.dueDate<todayStr()).length} overdue</span>
        <span class="badge badge-amber" style="font-size:11px">${sorted.filter(t=>t.dueDate>=todayStr()).length} upcoming</span>
      </div>
    </div>

    ${sorted.length===0&&completed.length===0?`
      <div class="empty"><i class="ti ti-checklist"></i><p>No tasks yet</p><small>Tasks are auto-created when RFQs need quoting or following up</small></div>`:''}

    ${sorted.length>0?`
      <div class="text-label" style="margin-bottom:8px">Pending (${sorted.length})</div>
      ${sorted.map(t=>{
        const rfq = STATE.rfqs.find(r=>r.id===t.rfqId);
        const cmp = co(t.companyId);
        const isOverdue = t.dueDate<todayStr();
        const daysUntil = Math.ceil((new Date(t.dueDate)-Date.now())/86400000);
        return `<div class="card" style="margin-bottom:8px;border-color:${isOverdue?'rgba(239,68,68,.3)':t.priority==='high'?'rgba(245,158,11,.3)':'var(--border)'}">
          <div class="row-between" style="margin-bottom:6px">
            <div style="flex:1;min-width:0">
              <div style="font-size:12px;font-weight:500;margin-bottom:2px">${t.title}</div>
              <div class="text-xs">${cmp?.name||''} ${isM&&rep(t.repId)?.name?'· '+rep(t.repId).name:''}</div>
            </div>
            <div style="flex-shrink:0;text-align:right;margin-left:8px">
              <div class="text-xs" style="color:${isOverdue?'#FCA5A5':'var(--text2)'}">
                ${isOverdue?`${Math.abs(daysUntil)}d overdue`:daysUntil===0?'Due today':`Due in ${daysUntil}d`}
              </div>
              <span class="badge ${t.type==='quote'?'badge-red':'badge-amber'}" style="font-size:8px;margin-top:2px">${t.type==='quote'?'Quote':'Follow up'}</span>
            </div>
          </div>
          ${rfq?`<div class="text-xs" style="color:var(--text3);margin-bottom:8px">${rfq.rfqSubject||''} · ${rfq.category||''}</div>`:''}
          <div class="row" style="gap:6px">
            <button class="btn btn-success btn-sm" style="font-size:10px" onclick="act(this,()=>completeTask('${t.id}'),'Saving…')"><i class="ti ti-check"></i> Done</button>
            ${rfq?`<button class="btn btn-primary btn-sm" style="font-size:10px" onclick="openRFQDetail('${rfq.id}');navigate('rfq')"><i class="ti ti-file-invoice"></i> View RFQ</button>`:''}
            <button class="btn btn-sm" style="font-size:10px" onclick="act(this,()=>snoozeTask('${t.id}'),'Snoozing…')"><i class="ti ti-clock"></i> Snooze 2d</button>
          </div>
        </div>`;
      }).join('')}`:''}

    ${completed.length>0?`
      <div class="text-label" style="margin-top:12px;margin-bottom:8px">Completed (${completed.length})</div>
      ${completed.slice(0,5).map(t=>`
        <div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);opacity:.6">
          <i class="ti ti-circle-check" style="color:var(--emerald);font-size:16px;flex-shrink:0"></i>
          <div style="flex:1"><div style="font-size:11px;text-decoration:line-through">${t.title}</div></div>
        </div>`).join('')}`:''}`;
}

async function completeTask(taskId) {
  await apiUpdate('Tasks',{id:taskId,status:'completed'});
  const t=STATE.tasks.find(x=>x.id===taskId);if(t)t.status='completed';
  showToast('Task completed ✓','success');
  renderTasks();
}

async function snoozeTask(taskId) {
  const t=STATE.tasks.find(x=>x.id===taskId);if(!t)return;
  const newDate=new Date(t.dueDate);newDate.setDate(newDate.getDate()+2);
  const newDateStr=newDate.toISOString().slice(0,10);
  await apiUpdate('Tasks',{id:taskId,dueDate:newDateStr});
  t.dueDate=newDateStr;
  showToast('Snoozed 2 days ✓','');
  renderTasks();
}

// ── PULL TO REFRESH ───────────────────────────────────────────────────────────
(function() {
  let startY=0, pulling=false;
  const threshold=80;
  document.addEventListener('touchstart',e=>{
    if(document.getElementById('content-area').scrollTop===0) { startY=e.touches[0].clientY; pulling=true; }
  },{passive:true});
  document.addEventListener('touchmove',e=>{
    if(!pulling) return;
    const dy=e.touches[0].clientY-startY;
    if(dy>threshold) document.getElementById('ptr-indicator')?.classList.add('visible');
    else document.getElementById('ptr-indicator')?.classList.remove('visible');
  },{passive:true});
  document.addEventListener('touchend',e=>{
    if(!pulling) return;
    const dy=e.changedTouches[0].clientY-startY;
    pulling=false;
    document.getElementById('ptr-indicator')?.classList.remove('visible');
    if(dy>threshold) refreshData();
  });
})();

function showCollabNotifications() {
  const notifs = JSON.parse(localStorage.getItem('collabNotifs')||'[]');
  const mine = notifs.filter(function(n){return n.repId===STATE.user?.id;});
  if(!mine.length){ showToast('No new notifications',''); return; }
  mine.forEach(function(n){n.seen=true;});
  localStorage.setItem('collabNotifs', JSON.stringify(notifs));
  updateNotifDot();
  const panel = document.getElementById('panel-visit');
  let html = "";
  html += "<div class=\"panel-head\">";
  html += "<button class=\"panel-back\" onclick=\"closePanel('visit')\">";
  html += "<i class=\"ti ti-arrow-left\" style=\"font-size:20px\"></i></button>";
  html += "<span class=\"panel-title\">Notifications</span></div>";
  mine.slice().reverse().forEach(function(n){
    const d = (n.date||'').replace(/'/g,'');
    html += "<div class=\"card\" style=\"margin-bottom:8px\">";
    html += "<i class=\"ti ti-users\" style=\"color:var(--indigo2);font-size:16px;flex-shrink:0\"></i>";
    html += "<div style=\"font-size:12px;font-weight:500\">" + (n.message||'') + "</div>";
    html += "<div style=\"font-size:10px;color:var(--text3)\">" + ((n.createdAt||'').slice(0,10)) + "</div>";
    html += "<button class=\"btn btn-sm\" data-d=\"" + d + "\" onclick=\"STATE.pld=this.dataset.d;closePanel('visit');navigate('plan')\">View in plan</button>";
    html += "</div></div>";
  });
  panel.innerHTML = html;
  openPanel('visit');
}

initLogin();
